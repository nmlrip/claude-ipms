const OP_FIELDS = ["date", "otNumber", "surgeon", "assistant", "anaesthesia", "procedure", "implant", "bloodLoss", "duration", "complication", "specimen", "drain", "closure", "postOpAdvice"];
const OP_LABELS = { date: "Date", otNumber: "OT Number", surgeon: "Surgeon", assistant: "Assistant", anaesthesia: "Anaesthesia", procedure: "Procedure", implant: "Implant", bloodLoss: "Blood Loss", duration: "Duration", complication: "Complication", specimen: "Specimen", drain: "Drain", closure: "Closure", postOpAdvice: "Post-op Advice" };

function TasksTab({ patient: p, update }) {
  const [form, setForm] = useState({ text: "", dueDate: todayISO() });
  const tasks = p.tasks || [];
  const sorted = [...tasks].sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    return (a.dueDate || "") < (b.dueDate || "") ? -1 : 1;
  });

  function addTask(e) {
    e.preventDefault();
    if (!form.text.trim()) return;
    update((x) => ({ ...x, tasks: [...(x.tasks || []), { id: uid("tk"), text: form.text.trim(), dueDate: form.dueDate, done: false, createdAt: Date.now() }] }));
    setForm({ text: "", dueDate: todayISO() });
  }
  function toggleDone(id) {
    update((x) => ({ ...x, tasks: (x.tasks || []).map((t) => (t.id === id ? { ...t, done: !t.done, doneAt: !t.done ? Date.now() : null } : t)) }));
  }
  function removeTask(id) {
    update((x) => ({ ...x, tasks: (x.tasks || []).filter((t) => t.id !== id) }));
  }

  return (
    <div className="flex flex-col gap-4">
      <Card className="p-4">
        <div className="text-xs font-semibold mb-2" style={{ color: C.ink }}>Add a task or reminder</div>
        <form onSubmit={addTask} className="grid grid-cols-1 sm:grid-cols-[1fr_160px_auto] gap-2 items-end">
          <Field label="Task"><TextInput value={form.text} onChange={(e) => setForm((s) => ({ ...s, text: e.target.value }))} placeholder="e.g. Repeat CBC tomorrow, Remove drain POD3" /></Field>
          <Field label="Due Date"><TextInput type="date" value={form.dueDate} onChange={(e) => setForm((s) => ({ ...s, dueDate: e.target.value }))} /></Field>
          <Button variant="teal" icon={Plus} type="submit">Add</Button>
        </form>
      </Card>
      <div className="flex flex-col gap-2">
        {sorted.map((t) => {
          const overdue = !t.done && t.dueDate && t.dueDate < todayISO();
          const dueToday = !t.done && t.dueDate === todayISO();
          return (
            <Card key={t.id} className="p-3 flex items-center justify-between gap-3" style={{ background: t.done ? C.paper : overdue ? C.coralSoft : "#fff" }}>
              <div className="flex items-center gap-3">
                <input type="checkbox" checked={t.done} onChange={() => toggleDone(t.id)} style={{ width: 16, height: 16 }} />
                <div>
                  <div className="text-sm" style={{ color: t.done ? C.slate : C.ink, textDecoration: t.done ? "line-through" : "none" }}>{t.text}</div>
                  <div className="text-[11px] font-mono" style={{ fontFamily: "IBM Plex Mono, monospace", color: overdue ? C.coral : C.slate }}>
                    Due {fmtDate(t.dueDate)}{overdue && " · Overdue"}{dueToday && " · Today"}
                  </div>
                </div>
              </div>
              <div className="flex items-center gap-2">
                {overdue && <Pill tone="coral">Overdue</Pill>}
                {dueToday && <Pill tone="amber">Today</Pill>}
                <button onClick={() => removeTask(t.id)}><Trash2 size={13} style={{ color: C.coral }} /></button>
              </div>
            </Card>
          );
        })}
        {sorted.length === 0 && <EmptyState icon={ClipboardList} title="No tasks yet" sub="Add quick reminders like 'Repeat CBC tomorrow' or 'Remove drain POD3' so nothing gets missed on rounds." />}
      </div>
    </div>
  );
}


function OperativeTab({ patient: p, patientId, update, globalUpdate }) {
  const blankCompleted = { date: todayISO(), otNumber: "", surgeon: "", assistant: "", anaesthesia: "General Anaesthesia", procedure: "", implant: "", bloodLoss: "", duration: "", complication: "None", specimen: "", drain: "", closure: "", postOpAdvice: "", priority: "Elective" };
  const blankPlanned = { date: todayISO(), otNumber: "", surgeon: "", procedure: "", priority: "Elective" };

  const [mode, setMode] = useState(null); // null | "schedule" | "record"
  const [form, setForm] = useState(blankCompleted);
  const [scheduleForm, setScheduleForm] = useState(blankPlanned);
  const [completingId, setCompletingId] = useState(null);
  const [viewOp, setViewOp] = useState(null);

  function scheduleSubmit(e) {
    e.preventDefault();
    if (!scheduleForm.procedure) return;
    createOperationRecord(globalUpdate, patientId, {
      status: "planned", assistant: "", anaesthesia: "", implant: "", bloodLoss: "", duration: "",
      complication: "", specimen: "", drain: "", closure: "", postOpAdvice: "", ...scheduleForm,
    });
    setScheduleForm(blankPlanned); setMode(null);
  }

  function recordSubmit(e) {
    e.preventDefault();
    if (!form.procedure) return;
    if (completingId) {
      update((x) => ({ ...x, operations: x.operations.map((o) => (o.id === completingId ? { ...o, ...form, status: "completed" } : o)) }));
      setCompletingId(null);
    } else {
      createOperationRecord(globalUpdate, patientId, { ...form, status: "completed" });
    }
    setForm(blankCompleted); setMode(null);
  }

  function startComplete(op) {
    setForm({ ...blankCompleted, ...op, complication: op.complication || "None" });
    setCompletingId(op.id);
    setMode("record");
    setViewOp(null);
  }

  function removeOp(id) { update((x) => ({ ...x, operations: x.operations.filter((o) => o.id !== id) })); }

  const sorted = [...p.operations].sort((a, b) => (a.date < b.date ? 1 : -1));

  return (
    <div className="flex flex-col gap-4">
      <div className="flex flex-wrap gap-2">
        <Button variant="teal" icon={Clock} onClick={() => { setScheduleForm(blankPlanned); setMode(mode === "schedule" ? null : "schedule"); }}>Schedule Operation</Button>
        <Button variant="outline" icon={Plus} onClick={() => { setForm(blankCompleted); setCompletingId(null); setMode(mode === "record" ? null : "record"); }}>Add Completed Operative Note</Button>
      </div>

      {mode === "schedule" && (
        <Card className="p-4">
          <div className="text-xs font-semibold mb-2" style={{ color: C.ink }}>Add this patient to the Operation List (planned)</div>
          <form onSubmit={scheduleSubmit} className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3">
            <Field label="Procedure" full><TextInput required value={scheduleForm.procedure} onChange={(e) => setScheduleForm((s) => ({ ...s, procedure: e.target.value }))} /></Field>
            <Field label="Planned Date"><TextInput type="date" value={scheduleForm.date} onChange={(e) => setScheduleForm((s) => ({ ...s, date: e.target.value }))} /></Field>
            <Field label="OT Number"><TextInput value={scheduleForm.otNumber} onChange={(e) => setScheduleForm((s) => ({ ...s, otNumber: e.target.value }))} /></Field>
            <Field label="Surgeon"><TextInput value={scheduleForm.surgeon} onChange={(e) => setScheduleForm((s) => ({ ...s, surgeon: e.target.value }))} /></Field>
            <Field label="Priority">
              <Select value={scheduleForm.priority} onChange={(e) => setScheduleForm((s) => ({ ...s, priority: e.target.value }))}>
                <option>Elective</option><option>Urgent</option><option>Emergency</option>
              </Select>
            </Field>
          </form>
          <div className="flex justify-end gap-2 mt-3">
            <Button type="button" variant="outline" onClick={() => setMode(null)}>Cancel</Button>
            <Button variant="teal" icon={CheckCircle2} onClick={scheduleSubmit}>Add to Operation List</Button>
          </div>
        </Card>
      )}

      {mode === "record" && (
        <Card className="p-4">
          <div className="text-xs font-semibold mb-2" style={{ color: C.ink }}>{completingId ? "Complete operative note" : "Add completed operative note"}</div>
          <form onSubmit={recordSubmit} className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3">
            {OP_FIELDS.map((k) => (
              <Field key={k} label={OP_LABELS[k]} full={k === "procedure" || k === "postOpAdvice"}>
                {k === "date" ? <TextInput type="date" value={form[k]} onChange={(e) => setForm((s) => ({ ...s, [k]: e.target.value }))} />
                  : k === "anaesthesia" ? <Select value={form[k]} onChange={(e) => setForm((s) => ({ ...s, [k]: e.target.value }))}>{["General Anaesthesia", "Spinal", "Local", "Regional", "Sedation"].map((v) => <option key={v}>{v}</option>)}</Select>
                    : <TextInput value={form[k]} onChange={(e) => setForm((s) => ({ ...s, [k]: e.target.value }))} />}
              </Field>
            ))}
            <Field label="Priority">
              <Select value={form.priority} onChange={(e) => setForm((s) => ({ ...s, priority: e.target.value }))}>
                <option>Elective</option><option>Urgent</option><option>Emergency</option>
              </Select>
            </Field>
          </form>
          <div className="flex justify-end gap-2 mt-3">
            <Button type="button" variant="outline" onClick={() => { setMode(null); setCompletingId(null); }}>Cancel</Button>
            <Button variant="teal" icon={CheckCircle2} onClick={recordSubmit}>Save Operative Note</Button>
          </div>
        </Card>
      )}

      <Card className="overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead><tr className="text-left border-b" style={{ borderColor: C.line, background: C.paper }}>
              {["Op ID", "Date", "Procedure", "Surgeon", "Priority", "Status", ""].map((h) => (
                <th key={h} className="px-4 py-2 text-[11px] font-semibold uppercase tracking-wide" style={{ color: C.slate }}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {sorted.map((o) => (
                <tr key={o.id} className="border-b last:border-b-0" style={{ borderColor: C.lineSoft }}>
                  <td className="px-4 py-2.5 font-mono text-xs" style={{ fontFamily: "IBM Plex Mono, monospace", color: C.teal }}>{o.opId || "—"}</td>
                  <td className="px-4 py-2.5 font-mono text-xs" style={{ fontFamily: "IBM Plex Mono, monospace", color: C.slate }}>{fmtDate(o.date)}</td>
                  <td className="px-4 py-2.5 font-medium" style={{ color: C.ink }}>{o.procedure}</td>
                  <td className="px-4 py-2.5" style={{ color: C.slate }}>{o.surgeon || "—"}</td>
                  <td className="px-4 py-2.5"><Pill tone={o.priority === "Emergency" ? "coral" : o.priority === "Urgent" ? "amber" : "slate"}>{o.priority || "Elective"}</Pill></td>
                  <td className="px-4 py-2.5"><Pill tone={o.status === "completed" ? "green" : "amber"}>{o.status === "completed" ? "Completed" : "Planned"}</Pill></td>
                  <td className="px-4 py-2.5 text-right whitespace-nowrap">
                    <button onClick={() => setViewOp(o)} className="text-xs font-semibold mr-2" style={{ color: C.teal }}>View</button>
                    {o.status !== "completed" && <button onClick={() => startComplete(o)} className="text-xs font-semibold mr-2" style={{ color: C.green }}>Complete</button>}
                    <button onClick={() => removeOp(o.id)}><Trash2 size={13} style={{ color: C.coral }} /></button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        {p.operations.length === 0 && <EmptyState icon={Scissors} title="No operations scheduled or recorded" sub="Schedule an upcoming operation or log a completed one above." />}
      </Card>

      <Modal open={!!viewOp} onClose={() => setViewOp(null)} title={viewOp ? `${viewOp.opId || "Operative Note"} — ${viewOp.procedure}` : ""}>
        {viewOp && (
          <div className="flex flex-col gap-3 text-sm">
            <div className="flex gap-2">
              <Pill tone={viewOp.status === "completed" ? "green" : "amber"}>{viewOp.status === "completed" ? "Completed" : "Planned"}</Pill>
              <Pill tone={viewOp.priority === "Emergency" ? "coral" : viewOp.priority === "Urgent" ? "amber" : "slate"}>{viewOp.priority || "Elective"}</Pill>
            </div>
            <div className="grid grid-cols-2 gap-x-4 gap-y-1.5 text-xs">
              {OP_FIELDS.filter((k) => k !== "procedure").map((k) => (
                <div key={k}><span style={{ color: C.slate }}>{OP_LABELS[k]}: </span><span style={{ color: C.ink }}>{viewOp[k] || "—"}</span></div>
              ))}
            </div>
            {viewOp.status !== "completed" && <Button variant="teal" icon={CheckCircle2} onClick={() => startComplete(viewOp)}>Mark as Completed</Button>}
          </div>
        )}
      </Modal>
    </div>
  );
}

function ReferralTab({ patient: p, update, hospitalName }) {
  const [inEdit, setInEdit] = useState(!p.referralIn);
  const [inForm, setInForm] = useState(p.referralIn || { facility: "", referringDoctor: "", date: todayISO(), summary: "", contactNumber: "" });
  const [outForm, setOutForm] = useState({ facility: "", receivingDoctor: "", date: todayISO(), reason: "", summary: "", contactNumber: "" });
  const [sharePhoneById, setSharePhoneById] = useState({});

  function saveIn(e) {
    e.preventDefault();
    if (!inForm.facility) return;
    update((x) => ({ ...x, referralIn: { ...inForm } }));
    setInEdit(false);
  }
  function clearIn() { update((x) => ({ ...x, referralIn: null })); setInForm({ facility: "", referringDoctor: "", date: todayISO(), summary: "", contactNumber: "" }); setInEdit(true); }

  function addOut(e) {
    e.preventDefault();
    if (!outForm.facility) return;
    update((x) => ({ ...x, referralsOut: [{ id: uid("rf"), ...outForm }, ...(x.referralsOut || [])] }));
    setOutForm({ facility: "", receivingDoctor: "", date: todayISO(), reason: "", summary: "", contactNumber: "" });
  }
  function removeOut(id) { update((x) => ({ ...x, referralsOut: (x.referralsOut || []).filter((r) => r.id !== id) })); }

  return (
    <div className="flex flex-col gap-4">
      <Card className="p-4">
        <div className="flex items-center justify-between mb-3">
          <SectionTitle eyebrow="Referred In" title="Referring Facility" />
          {p.referralIn && !inEdit && <Button size="sm" variant="outline" icon={Pencil} onClick={() => { setInForm(p.referralIn); setInEdit(true); }}>Edit</Button>}
        </div>
        {inEdit ? (
          <form onSubmit={saveIn} className="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <Field label="Referring Facility"><TextInput required value={inForm.facility} onChange={(e) => setInForm((s) => ({ ...s, facility: e.target.value }))} /></Field>
            <Field label="Referring Doctor"><TextInput value={inForm.referringDoctor} onChange={(e) => setInForm((s) => ({ ...s, referringDoctor: e.target.value }))} /></Field>
            <Field label="Date"><TextInput type="date" value={inForm.date} onChange={(e) => setInForm((s) => ({ ...s, date: e.target.value }))} /></Field>
            <Field label="Contact Number"><TextInput value={inForm.contactNumber} onChange={(e) => setInForm((s) => ({ ...s, contactNumber: e.target.value }))} /></Field>
            <Field label="Referring Facility's Summary" full hint="Findings, treatment given, and reason for referral, as provided"><TextArea rows={3} value={inForm.summary} onChange={(e) => setInForm((s) => ({ ...s, summary: e.target.value }))} /></Field>
            <div className="sm:col-span-2 flex gap-2">
              {p.referralIn && <Button type="button" variant="outline" onClick={() => setInEdit(false)}>Cancel</Button>}
              <Button variant="teal" icon={CheckCircle2} type="submit">Save</Button>
            </div>
          </form>
        ) : p.referralIn ? (
          <div className="flex flex-col gap-1.5 text-sm">
            <div><b style={{ color: C.ink }}>{p.referralIn.facility}</b> {p.referralIn.referringDoctor && <span style={{ color: C.slate }}>— {p.referralIn.referringDoctor}</span>}</div>
            <div className="text-xs font-mono" style={{ fontFamily: "IBM Plex Mono, monospace", color: C.slate }}>{fmtDate(p.referralIn.date)} {p.referralIn.contactNumber && `· ${p.referralIn.contactNumber}`}</div>
            <div className="text-xs" style={{ color: C.ink }}>{p.referralIn.summary || "No summary provided."}</div>
            <Button size="sm" variant="ghost" icon={Trash2} onClick={clearIn} className="self-start mt-1">Remove</Button>
          </div>
        ) : (
          <EmptyState icon={RouteIcon} title="Not a referred-in patient" sub="If this patient arrived from another facility, add the referring facility above." />
        )}
      </Card>

      <Card className="p-4">
        <SectionTitle eyebrow="Referred Out" title="Send to Another Facility" />
        <form onSubmit={addOut} className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
          <Field label="Receiving Facility"><TextInput required value={outForm.facility} onChange={(e) => setOutForm((s) => ({ ...s, facility: e.target.value }))} /></Field>
          <Field label="Receiving Doctor"><TextInput value={outForm.receivingDoctor} onChange={(e) => setOutForm((s) => ({ ...s, receivingDoctor: e.target.value }))} /></Field>
          <Field label="Date"><TextInput type="date" value={outForm.date} onChange={(e) => setOutForm((s) => ({ ...s, date: e.target.value }))} /></Field>
          <Field label="Contact Number"><TextInput value={outForm.contactNumber} onChange={(e) => setOutForm((s) => ({ ...s, contactNumber: e.target.value }))} /></Field>
          <Field label="Reason for Referral" full><TextInput value={outForm.reason} onChange={(e) => setOutForm((s) => ({ ...s, reason: e.target.value }))} placeholder="e.g. needs neurosurgical ICU bed, MRI unavailable here" /></Field>
          <Field label="Clinical Summary" full><TextArea rows={3} value={outForm.summary} onChange={(e) => setOutForm((s) => ({ ...s, summary: e.target.value }))} /></Field>
          <div className="sm:col-span-2"><Button variant="teal" icon={Plus} type="submit">Add Referral-Out</Button></div>
        </form>
        <div className="flex flex-col gap-3">
          {(p.referralsOut || []).map((r) => {
            const shareText = buildReferralOutShareText(p, r, hospitalName);
            const sharePhone = sharePhoneById[r.id] ?? r.contactNumber ?? "";
            return (
              <Card key={r.id} className="p-3" style={{ background: C.paper }}>
                <div className="flex items-center justify-between mb-1">
                  <div className="text-sm font-semibold" style={{ color: C.ink }}>{r.facility}{r.receivingDoctor && <span className="font-normal" style={{ color: C.slate }}> — {r.receivingDoctor}</span>}</div>
                  <button onClick={() => removeOut(r.id)}><Trash2 size={13} style={{ color: C.coral }} /></button>
                </div>
                <div className="text-xs font-mono mb-1" style={{ fontFamily: "IBM Plex Mono, monospace", color: C.slate }}>{fmtDate(r.date)}</div>
                <div className="text-xs mb-2" style={{ color: C.ink }}><b>Reason:</b> {r.reason || "—"}</div>
                <div className="flex flex-wrap items-end gap-2">
                  <Field label="Share to"><TextInput value={sharePhone} onChange={(e) => setSharePhoneById((s) => ({ ...s, [r.id]: e.target.value }))} placeholder="Receiving doctor's number" /></Field>
                  <a href={waShareUrl(sharePhone, shareText)} target="_blank" rel="noopener noreferrer"><Button type="button" size="sm" variant="outline" icon={MessageCircle}>WhatsApp</Button></a>
                  <a href={smsShareUrl(sharePhone, shareText)}><Button type="button" size="sm" variant="outline" icon={MessageCircle}>SMS</Button></a>
                </div>
              </Card>
            );
          })}
          {(p.referralsOut || []).length === 0 && <div className="text-xs" style={{ color: C.slate }}>No outgoing referrals for this patient.</div>}
        </div>
      </Card>
    </div>
  );
}

function FollowUpSection({ patient: p, update }) {
  const [form, setForm] = useState({ date: "", notes: "" });
  const followUps = [...(p.followUps || [])].sort((a, b) => (a.date < b.date ? -1 : 1));

  function addVisit(e) {
    e.preventDefault();
    if (!form.date) return;
    update((x) => ({ ...x, followUps: [...(x.followUps || []), { id: uid("fu"), date: form.date, status: "scheduled", notes: form.notes, createdAt: Date.now() }] }));
    setForm({ date: "", notes: "" });
  }
  function setStatus(id, status) {
    update((x) => ({ ...x, followUps: (x.followUps || []).map((f) => (f.id === id ? { ...f, status } : f)) }));
  }
  function removeVisit(id) {
    update((x) => ({ ...x, followUps: (x.followUps || []).filter((f) => f.id !== id) }));
  }

  return (
    <Card className="p-4">
      <SectionTitle eyebrow="Post-discharge" title="Follow-up Visits" />
      <form onSubmit={addVisit} className="grid grid-cols-1 sm:grid-cols-[160px_1fr_auto] gap-2 items-end mb-3">
        <Field label="Visit Date"><TextInput type="date" value={form.date} onChange={(e) => setForm((s) => ({ ...s, date: e.target.value }))} /></Field>
        <Field label="Notes"><TextInput value={form.notes} onChange={(e) => setForm((s) => ({ ...s, notes: e.target.value }))} placeholder="e.g. suture removal, repeat imaging" /></Field>
        <Button variant="teal" icon={Plus} type="submit">Add Visit</Button>
      </form>
      <div className="flex flex-col gap-2">
        {followUps.map((f) => {
          const overdue = f.status === "scheduled" && f.date < todayISO();
          return (
            <div key={f.id} className="flex items-center justify-between gap-3 p-2.5 rounded-md" style={{ background: overdue ? C.coralSoft : C.paper }}>
              <div className="flex items-center gap-3">
                <div className="font-mono text-xs" style={{ fontFamily: "IBM Plex Mono, monospace", color: overdue ? C.coral : C.ink }}>{fmtDate(f.date)}</div>
                <div className="text-xs" style={{ color: C.slate }}>{f.notes || "Routine follow-up"}</div>
                {overdue && <Pill tone="coral">Overdue</Pill>}
              </div>
              <div className="flex items-center gap-2">
                <Select value={f.status} onChange={(e) => setStatus(f.id, e.target.value)} className="text-xs py-1">
                  <option value="scheduled">Scheduled</option>
                  <option value="attended">Attended</option>
                  <option value="missed">Missed</option>
                  <option value="rescheduled">Rescheduled</option>
                </Select>
                <button onClick={() => removeVisit(f.id)}><Trash2 size={13} style={{ color: C.coral }} /></button>
              </div>
            </div>
          );
        })}
        {followUps.length === 0 && <div className="text-xs py-3" style={{ color: C.slate }}>No follow-up visits scheduled yet.</div>}
      </div>
    </Card>
  );
}

function DischargeTab({ patient: p, ward, update, hospitalName }) {
  const d = p.discharge || {};
  const [f, setF] = useState({
    admissionDiagnosis: p.diagnosis, finalDiagnosis: d.finalDiagnosis || p.diagnosis,
    examinationFindings: d.examinationFindings || "", hospitalCourse: d.hospitalCourse || "",
    managementReceived: d.managementReceived || "", dischargeTreatmentAdvice: d.dischargeTreatmentAdvice || "",
    followUp: d.followUp || "", nextVisit: d.nextVisit || "", dischargeDate: d.dischargeDate || todayISO(),
    doctorSignature: d.doctorSignature || p.consultant, outcome: d.outcome || "Improved",
  });
  const [sharePhone, setSharePhone] = useState(p.phone || "");
  const set = (k) => (e) => setF((s) => ({ ...s, [k]: e.target.value }));
  const printRef = useRef(null);

  function autoSummarize() {
    const invLines = p.investigations.slice(0, 6).map((i) => `${i.name}: ${i.result}`).join("; ");
    const medLines = p.medications.map((m) => `${m.drug} ${m.dose} ${m.route} ${m.frequency}${m.stop ? `, stopped ${fmtDate(m.stop)}` : ", ongoing"}`).join(". ");
    const opLines = p.operations.filter((o) => o.status === "completed").map((o) => `${o.procedure} (${fmtDate(o.date)}) by ${o.surgeon}`).join("; ");
    const noteLines = p.progressNotes.map((n) => `${fmtDate(n.date)}: ${n.a}`).join(" ");
    const examLines = p.progressNotes.filter((n) => n.o).map((n) => `${fmtDate(n.date)} — ${n.o}`).join(" | ");
    const activeMeds = p.medications.filter((m) => !m.stop).map((m) => `${m.drug} ${m.dose} ${m.route} ${m.frequency}`).join(", ");
    setF((s) => ({
      ...s,
      examinationFindings: examLines || "On examination at admission: vitals stable, systemic examination unremarkable unless otherwise noted on progress charting.",
      hospitalCourse: `Admitted ${fmtDate(p.dateOfAdmission)} with ${p.diagnosis}. ${opLines ? "Underwent " + opLines + ". " : ""}${noteLines || "Managed conservatively with regular monitoring."}`.trim(),
      managementReceived: [medLines && `Medications: ${medLines}`, opLines && `Procedures/Operations performed: ${opLines} (full operative note below)`, p.investigations.length && `Investigations sent: ${invLines}`].filter(Boolean).join(". ") || "Supportive care and ward monitoring as charted.",
      dischargeTreatmentAdvice: activeMeds ? `Continue: ${activeMeds}. Advise adequate rest, wound/site care as instructed, and adherence to prescribed medication schedule.` : "Advise adequate rest and adherence to prescribed medication schedule.",
    }));
  }

  function finalize() {
    update((x) => {
      const firstFollowUp = f.nextVisit ? [{ id: uid("fu"), date: f.nextVisit, status: "scheduled", notes: f.followUp || "", createdAt: Date.now() }] : [];
      return { ...x, status: "discharged", discharge: { ...f }, followUps: [...(x.followUps || []), ...firstFollowUp] };
    });
    alert("Patient discharged. Certificate finalized, and the first follow-up visit was added to the tracker.");
  }
  function printCert() { window.print(); }

  return (
    <div className="flex flex-col gap-4">
      {p.status === "discharged" ? (
        <Pill tone="green">Discharged on {fmtDate(p.discharge?.dischargeDate)} · Outcome: {p.discharge?.outcome || "Improved"}</Pill>
      ) : (
        <Card className="p-4">
          <div className="flex justify-between items-center mb-3">
            <div className="text-xs font-semibold" style={{ color: C.ink }}>Compose discharge summary</div>
            <Button size="sm" variant="outline" icon={Sparkles} onClick={autoSummarize}>Auto-summarize from chart</Button>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <Field label="Admission Diagnosis"><TextInput value={f.admissionDiagnosis} onChange={set("admissionDiagnosis")} /></Field>
            <Field label="Final Diagnosis"><TextInput value={f.finalDiagnosis} onChange={set("finalDiagnosis")} /></Field>
            <Field label="Clinical Examination Findings" full hint="General and systemic examination findings noted during the stay"><TextArea rows={3} value={f.examinationFindings} onChange={set("examinationFindings")} /></Field>
            <Field label="Hospital Course" full><TextArea rows={3} value={f.hospitalCourse} onChange={set("hospitalCourse")} /></Field>
            <Field label="Management Received During Admission" full hint="Medications, procedures, operations and investigations given while admitted"><TextArea rows={3} value={f.managementReceived} onChange={set("managementReceived")} /></Field>
            <Field label="Treatment & Advice at Discharge" full hint="Medicines to continue, dosage instructions, activity/diet restrictions, wound care"><TextArea rows={3} value={f.dischargeTreatmentAdvice} onChange={set("dischargeTreatmentAdvice")} /></Field>
            <Field label="Outcome">
              <Select value={f.outcome} onChange={set("outcome")}>
                <option>Improved</option><option>Cured</option><option>Referred</option><option>Left Against Medical Advice</option><option>Deceased</option>
              </Select>
            </Field>
            <Field label="Follow-up"><TextInput value={f.followUp} onChange={set("followUp")} /></Field>
            <Field label="Next Visit"><TextInput type="date" value={f.nextVisit} onChange={set("nextVisit")} /></Field>
            <Field label="Discharge Date"><TextInput type="date" value={f.dischargeDate} onChange={set("dischargeDate")} /></Field>
            <Field label="Doctor Signature"><TextInput value={f.doctorSignature} onChange={set("doctorSignature")} /></Field>
          </div>
          <div className="flex justify-end gap-2 mt-4">
            <Button variant="outline" icon={Printer} onClick={printCert}>Preview / Print</Button>
            <Button variant="teal" icon={BadgeCheck} onClick={finalize}>Finalize Discharge</Button>
          </div>
          <div className="flex flex-wrap items-end gap-2 mt-3 pt-3 border-t" style={{ borderColor: C.lineSoft }}>
            <Field label="Share to (phone, optional)"><TextInput value={sharePhone} onChange={(e) => setSharePhone(e.target.value)} placeholder="01XXXXXXXXX" /></Field>
            <a href={waShareUrl(sharePhone, buildDischargeShareText(p, f, hospitalName))} target="_blank" rel="noopener noreferrer">
              <Button type="button" variant="outline" icon={MessageCircle}>Share via WhatsApp</Button>
            </a>
            <a href={smsShareUrl(sharePhone, buildDischargeShareText(p, f, hospitalName))}>
              <Button type="button" variant="outline" icon={MessageCircle}>Share via SMS</Button>
            </a>
          </div>
        </Card>
      )}

      {p.status === "discharged" && <FollowUpSection patient={p} update={update} />}

      <Card className="p-6 print-area" ref={printRef}>
        <div className="flex justify-between items-start border-b pb-3 mb-3" style={{ borderColor: C.line }}>
          <div>
            <div className="font-serif text-lg" style={{ color: C.ink, fontFamily: "Fraunces, serif" }}>Green Valley Medical College Hospital</div>
            <div className="text-xs" style={{ color: C.slate }}>Discharge Certificate</div>
          </div>
          <MrnBarcode value={p.mrn} />
        </div>
        <div className="grid grid-cols-2 gap-2 text-xs mb-3">
          <div><b style={{ color: C.ink }}>Patient:</b> {p.name} ({p.age}/{p.sex?.[0]})</div>
          <div><b style={{ color: C.ink }}>MRN:</b> <span className="font-mono" style={{ fontFamily: "IBM Plex Mono, monospace" }}>{p.mrn}</span></div>
          <div><b style={{ color: C.ink }}>Ward / Bed:</b> {ward?.name} · {p.bedNumber}</div>
          <div><b style={{ color: C.ink }}>Admission:</b> {fmtDate(p.dateOfAdmission)}</div>
          <div><b style={{ color: C.ink }}>Discharge:</b> {fmtDate(f.dischargeDate)}</div>
          <div><b style={{ color: C.ink }}>Consultant:</b> {p.consultant}</div>
        </div>
        <div className="flex flex-col gap-2 text-xs">
          <div><b style={{ color: C.ink }}>Admission Diagnosis:</b> {f.admissionDiagnosis || "—"}</div>
          <div><b style={{ color: C.ink }}>Final Diagnosis:</b> {f.finalDiagnosis || "—"}</div>
          <div><b style={{ color: C.ink }}>Clinical Examination Findings:</b> {f.examinationFindings || "—"}</div>
          <div><b style={{ color: C.ink }}>Hospital Course:</b> {f.hospitalCourse || "—"}</div>
          <div><b style={{ color: C.ink }}>Investigations:</b> {p.investigations.map((i) => `${i.name}: ${i.result}`).join("; ") || "—"}</div>
          <div><b style={{ color: C.ink }}>Operations:</b> {p.operations.filter((o) => o.status === "completed").map((o) => o.procedure).join(", ") || "None"}</div>
          <div><b style={{ color: C.ink }}>Management Received During Admission:</b> {f.managementReceived || "—"}</div>
          {p.operations.filter((o) => o.status === "completed").length > 0 && (
            <div className="pl-3" style={{ borderLeft: `2px solid ${C.line}` }}>
              <div className="font-semibold mb-0.5" style={{ color: C.ink }}>Operative Note{p.operations.filter((o) => o.status === "completed").length > 1 ? "s" : ""}:</div>
              {p.operations.filter((o) => o.status === "completed").map((o) => (
                <div key={o.id} className="mb-1" style={{ color: C.ink }}>{o.opId ? `[${o.opId}] ` : ""}{formatOperativeNote(o)}</div>
              ))}
            </div>
          )}
          <div><b style={{ color: C.ink }}>Treatment &amp; Advice at Discharge:</b> {f.dischargeTreatmentAdvice || "—"}</div>
          <div><b style={{ color: C.ink }}>Follow-up:</b> {f.followUp || "—"} {f.nextVisit ? `· Next visit ${fmtDate(f.nextVisit)}` : ""}</div>
          <div><b style={{ color: C.ink }}>Outcome:</b> {f.outcome || "Improved"}</div>
        </div>
        <div className="flex justify-between items-end mt-8 pt-3 border-t text-xs" style={{ borderColor: C.line }}>
          <span style={{ color: C.slate }}>QR Verification: {p.mrn}-{f.dischargeDate}</span>
          <div className="text-right">
            <div className="border-b w-40 mb-1" style={{ borderColor: C.ink }}>&nbsp;</div>
            <span style={{ color: C.ink }}>{f.doctorSignature}</span>
          </div>
        </div>
      </Card>
    </div>
  );
}


/* ============================== GOOGLE SHEETS SYNC ==============================
   Real Sheets API v4 sync via Google Identity Services (client-side OAuth).
   Requires the person's own Google Cloud OAuth Client ID + a target Spreadsheet ID
   — an artifact has no server to hold a secret, so this uses the browser-only
   "token client" flow (implicit grant), same as any client-only Google integration.
==================================================================================== */
function colLetter(n) {
  let s = "";
  while (n > 0) { const m = (n - 1) % 26; s = String.fromCharCode(65 + m) + s; n = Math.floor((n - 1) / 26); }
  return s;
}

function patientsSheetRows(state) {
  const header = ["MRN", "Name", "Age", "Sex", "Phone", "Guardian", "Address", "Ward", "Bed", "Consultant", "Diagnosis", "ICD-10", "Blood Group", "Allergy", "Comorbidity", "Admission Date", "Admission Time", "Status", "Discharge Date", "LOS (days)", "Operations", "Investigations", "Medications"];
  const rows = state.patients.map((p) => {
    const ward = state.wards.find((w) => w.id === p.wardId);
    return [p.mrn, p.name, p.age, p.sex, p.phone, p.guardian, p.address, ward?.name || "", p.bedNumber, p.consultant, p.diagnosis, p.icd10 || "", p.bloodGroup, p.allergy, p.comorbidity, p.dateOfAdmission, p.admissionTime, p.status, p.discharge?.dischargeDate || "", daysBetween(p.dateOfAdmission, p.discharge?.dischargeDate), p.operations.length, p.investigations.length, p.medications.length];
  });
  return { header, rows };
}

function cohortSheetRows(rows, wards) {
  const header = ["MRN", "Name", "Age", "Sex", "Diagnosis", "ICD-10", "Ward", "Consultant", "Admission", "Discharge", "LOS (days)", "Operations", "Complications", "Status", "Outcome"];

    const ward = wards.find((w) => w.id === p.wardId);
    const complications = p.operations.map((o) => o.complication).filter((c) => c && c !== "None").join(" | ") || "None";
    return [p.mrn, p.name, p.age, p.sex, p.diagnosis, p.icd10 || "", ward?.name || "", p.consultant, p.dateOfAdmission, p.discharge?.dischargeDate || "", daysBetween(p.dateOfAdmission, p.discharge?.dischargeDate), p.operations.map((o) => o.procedure).join(" | "), complications, p.status, p.discharge?.outcome || ""];
  });
  return { header, rows: data };
}

function investigationsSheetRows(state) {
  const header = ["MRN", "Patient Name", "Date", "Investigation", "Result", "Status"];

  state.patients.forEach((p) => p.investigations.forEach((i) => rows.push([p.mrn, p.name, i.date, i.name, i.result, i.status])));

function medicationsSheetRows(state) {

function operationsSheetRows(state) {

function dischargeSheetRows(state) {

  return { header, rows };

function useGoogleSheetsSync(state, update) {
  const [accessToken, setAccessToken] = useState(null);
  const [syncing, setSyncing] = useState(false);
  const [syncingAll, setSyncingAll] = useState(false);
  const [syncError, setSyncError] = useState("");
  const [lastSync, setLastSync] = useState(null);
  const tokenClientRef = useRef(null);
  const pendingSyncAllRef = useRef(false);
  const cfg = (state && state.googleSheets) || { clientId: "", spreadsheetId: "", sheetTab: "Patients", autoSync: false };

  function setCfg(patch) { update((s) => ({ ...s, googleSheets: { ...(s.googleSheets || {}), ...patch } })); }

  function ensureTokenClient(clientId) {
    if (!window.google || !window.google.accounts || !window.google.accounts.oauth2) return null;
    if (tokenClientRef.current && tokenClientRef.current._clientId === clientId) return tokenClientRef.current;
    const client = window.google.accounts.oauth2.initTokenClient({
      client_id: clientId,
      scope: "https://www.googleapis.com/auth/spreadsheets",
      callback: (resp) => {
        if (resp && resp.access_token) { setAccessToken(resp.access_token); setSyncError(""); }
        else setSyncError("Google did not return an access token.");
      },
    });
    client._clientId = clientId;
    tokenClientRef.current = client;
    return client;
  }

  function connect() {
    if (!cfg.clientId) { setSyncError("Add your Google OAuth Client ID first (see setup steps below)."); return; }
    if (!window.google || !window.google.accounts) { setSyncError("Google Identity Services hasn't loaded yet — check your connection and try again."); return; }
    const client = ensureTokenClient(cfg.clientId);
    if (!client) { setSyncError("Could not initialize Google sign-in for this Client ID."); return; }
    client.requestAccessToken({ prompt: accessToken ? "" : "consent" });
  }
  function disconnect() { setAccessToken(null); }

  async function writeRange(tabName, header, rows) {
    if (!accessToken) throw new Error("Not connected — click Connect Google Account first.");
    if (!cfg.spreadsheetId) throw new Error("Add a Spreadsheet ID first.");
    const values = [header, ...rows];
    const a1 = `${tabName}!A1:${colLetter(header.length)}${values.length}`;
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${cfg.spreadsheetId}/values/${encodeURIComponent(a1)}?valueInputOption=RAW`;
    const res = await fetch(url, {
      method: "PUT",
      headers: { Authorization: `Bearer ${accessToken}`, "Content-Type": "application/json" },
      body: JSON.stringify({ range: a1, majorDimension: "ROWS", values }),
    });
    if (res.status === 401) { setAccessToken(null); throw new Error("Google session expired — reconnect and try again."); }
    if (!res.ok) { const t = await res.text(); throw new Error(`Sheets API error (${res.status}): ${t.slice(0, 220)}`); }
    return true;
  }

  async function syncNow(tabName, header, rows) {
    setSyncing(true); setSyncError("");
    try { await writeRange(tabName, header, rows); setLastSync(new Date()); }
    catch (e) { setSyncError(e.message); }
    finally { setSyncing(false); }
  }

  async function syncAll() {
    if (!accessToken) { pendingSyncAllRef.current = true; connect(); return; }
    if (!state) return;
    setSyncingAll(true); setSyncError("");
    try {
      await writeRange(cfg.sheetTab || "Patients", ...Object.values(patientsSheetRows(state)));
      await writeRange("Investigations", ...Object.values(investigationsSheetRows(state)));
      await writeRange("Medications", ...Object.values(medicationsSheetRows(state)));
      await writeRange("Operations", ...Object.values(operationsSheetRows(state)));
      await writeRange("Discharge Summaries", ...Object.values(dischargeSheetRows(state)));
      setLastSync(new Date());
    } catch (e) {
      setSyncError(e.message);
    } finally {
      setSyncingAll(false);
    }
  }

  useEffect(() => {
    if (accessToken && pendingSyncAllRef.current) {
      pendingSyncAllRef.current = false;
      syncAll();
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [accessToken]);

  return { cfg, setCfg, accessToken, connect, disconnect, syncing, syncingAll, syncError, lastSync, syncNow, syncAll };
}

/* ============================== TASKS & REMINDERS (HOSPITAL-WIDE) ============================== */
function TasksHubView({ state, update, openPatient }) {
  const [scope, setScope] = useState("open"); // open | overdue | today | all

  const rows = useMemo(() => {
    const list = [];
    state.patients.forEach((p) => {
      const ward = state.wards.find((w) => w.id === p.wardId);
      (p.tasks || []).forEach((t) => list.push({ ...t, patientId: p.id, patientName: p.name, mrn: p.mrn, wardName: ward?.name || "", patientStatus: p.status }));
    });
    return list.sort((a, b) => {
      if (a.done !== b.done) return a.done ? 1 : -1;
      return (a.dueDate || "") < (b.dueDate || "") ? -1 : 1;
    });
  }, [state]);

  const today = todayISO();
  const overdue = rows.filter((t) => !t.done && t.dueDate && t.dueDate < today);
  const dueToday = rows.filter((t) => !t.done && t.dueDate === today);
  const open = rows.filter((t) => !t.done);

  const filtered = scope === "overdue" ? overdue : scope === "today" ? dueToday : scope === "all" ? rows : open;

  function toggleDone(patientId, taskId, done) {
    update((s) => ({
      ...s,
      patients: s.patients.map((p) => p.id === patientId ? { ...p, tasks: (p.tasks || []).map((t) => (t.id === taskId ? { ...t, done: !done, doneAt: !done ? Date.now() : null } : t)) } : p),
    }));
  }

  return (
    <div>
      <TopBar title="Tasks & Reminders" sub="Everything easy to lose track of across multiple patients, in one list." />
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
        <StatCard label="Open Tasks" value={open.length} icon={ClipboardList} tone="blue" onClick={() => setScope("open")} />
        <StatCard label="Overdue" value={overdue.length} icon={AlertTriangle} tone="red" onClick={() => setScope("overdue")} />
        <StatCard label="Due Today" value={dueToday.length} icon={Clock} tone="orange" onClick={() => setScope("today")} />
        <StatCard label="All Tasks" value={rows.length} icon={CheckCircle2} tone="teal" onClick={() => setScope("all")} />
      </div>

      <div className="flex flex-wrap gap-2 mb-3">
        <Select value={scope} onChange={(e) => setScope(e.target.value)} className="max-w-[200px]">
          <option value="open">Open (not done)</option>
          <option value="overdue">Overdue</option>
          <option value="today">Due today</option>
          <option value="all">All, including done</option>
        </Select>
      </div>

      <Card className="overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead><tr className="text-left border-b" style={{ borderColor: C.line, background: C.paper }}>
              {["", "Task", "MRN", "Patient", "Ward", "Due Date", "Status"].map((h) => (
                <th key={h} className="px-4 py-2 text-[11px] font-semibold uppercase tracking-wide" style={{ color: C.slate }}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {filtered.map((t) => {
                const overdueRow = !t.done && t.dueDate && t.dueDate < today;
                const todayRow = !t.done && t.dueDate === today;
                return (
                  <tr key={t.id} className="border-b last:border-b-0" style={{ borderColor: C.lineSoft, background: overdueRow ? C.coralSoft : "transparent" }}>
                    <td className="px-4 py-2.5"><input type="checkbox" checked={t.done} onChange={() => toggleDone(t.patientId, t.id, t.done)} style={{ width: 16, height: 16 }} /></td>
                    <td className="px-4 py-2.5" style={{ color: t.done ? C.slate : C.ink, textDecoration: t.done ? "line-through" : "none" }}>{t.text}</td>
                    <td className="px-4 py-2.5 font-mono text-xs" style={{ fontFamily: "IBM Plex Mono, monospace", color: C.teal }}>{t.mrn}</td>
                    <td onClick={() => openPatient(t.patientId, "Tasks")} className="px-4 py-2.5 font-semibold cursor-pointer hover:underline" style={{ color: C.ink }}>{t.patientName}</td>
                    <td className="px-4 py-2.5" style={{ color: C.slate }}>{t.wardName}</td>
                    <td className="px-4 py-2.5 font-mono text-xs" style={{ fontFamily: "IBM Plex Mono, monospace", color: overdueRow ? C.coral : C.slate }}>{fmtDate(t.dueDate)}</td>
                    <td className="px-4 py-2.5">
                      {t.done ? <Pill tone="green">Done</Pill> : overdueRow ? <Pill tone="coral">Overdue</Pill> : todayRow ? <Pill tone="amber">Today</Pill> : <Pill tone="slate">Upcoming</Pill>}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        {filtered.length === 0 && <EmptyState icon={ClipboardList} title="Nothing here" sub="Add reminders from any patient's Tasks tab." />}
      </Card>
    </div>
  );
}

/* ============================== FOLLOW-UP TRACKER (POST-DISCHARGE) ============================== */
function FollowUpTrackerView({ state, openPatient }) {
  const [scope, setScope] = useState("upcoming");
  const today = todayISO();

  const rows = useMemo(() => {
    const list = [];
    state.patients.forEach((p) => {
      if (p.status !== "discharged") return;
      const ward = state.wards.find((w) => w.id === p.wardId);
      (p.followUps || []).forEach((f) => list.push({ ...f, patientId: p.id, patientName: p.name, mrn: p.mrn, wardName: ward?.name || "", diagnosis: p.diagnosis }));
    });
    return list.sort((a, b) => (a.date < b.date ? -1 : 1));
  }, [state]);

  const overdue = rows.filter((f) => f.status === "scheduled" && f.date < today);
  const upcoming = rows.filter((f) => f.status === "scheduled" && f.date >= today);
  const attended = rows.filter((f) => f.status === "attended");
  const missed = rows.filter((f) => f.status === "missed");

  const filtered = scope === "overdue" ? overdue : scope === "upcoming" ? upcoming : scope === "attended" ? attended : scope === "missed" ? missed : rows;

  return (
    <div>

        <StatCard label="Overdue" value={overdue.length} icon={AlertTriangle} tone="red" onClick={() => setScope("overdue")} />
        <StatCard label="Attended" value={attended.length} icon={CheckCircle2} tone="green" onClick={() => setScope("attended")} />
        <StatCard label="Missed" value={missed.length} icon={X} tone="orange" onClick={() => setScope("missed")} />

        <Select value={scope} onChange={(e) => setScope(e.target.value)} className="max-w-[200px]">

          <option value="overdue">Overdue</option>
          <option value="attended">Attended</option>
          <option value="missed">Missed</option>
          <option value="all">All</option>

      <Card className="overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead><tr className="text-left border-b" style={{ borderColor: C.line, background: C.paper }}>
              {["MRN", "Patient", "Diagnosis", "Ward", "Visit Date", "Notes", "Status"].map((h) => (
                <th key={h} className="px-4 py-2 text-[11px] font-semibold uppercase tracking-wide" style={{ color: C.slate }}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {filtered.map((f) => {
                const overdueRow = f.status === "scheduled" && f.date < today;
                return (
                  <tr key={f.id} onClick={() => openPatient(f.patientId, "Discharge")} className="border-b last:border-b-0 cursor-pointer hover:bg-black/[0.02]" style={{ borderColor: C.lineSoft, background: overdueRow ? C.coralSoft : "transparent" }}>
                    <td className="px-4 py-2.5 font-mono text-xs" style={{ fontFamily: "IBM Plex Mono, monospace", color: C.teal }}>{f.mrn}</td>
                    <td className="px-4 py-2.5 font-semibold" style={{ color: C.ink }}>{f.patientName}</td>
                    <td className="px-4 py-2.5" style={{ color: C.slate }}>{f.diagnosis}</td>
                    <td className="px-4 py-2.5" style={{ color: C.slate }}>{f.wardName}</td>
                    <td className="px-4 py-2.5 font-mono text-xs" style={{ fontFamily: "IBM Plex Mono, monospace", color: overdueRow ? C.coral : C.slate }}>{fmtDate(f.date)}</td>
                    <td className="px-4 py-2.5 max-w-[220px] truncate" style={{ color: C.slate }}>{f.notes || "—"}</td>
                    <td className="px-4 py-2.5">
                      {f.status === "attended" ? <Pill tone="green">Attended</Pill> : f.status === "missed" ? <Pill tone="coral">Missed</Pill> : overdueRow ? <Pill tone="coral">Overdue</Pill> : <Pill tone="amber">Scheduled</Pill>}
                    </td>
                  </tr>
                );
              })}

          </table>
        </div>
        {filtered.length === 0 && <EmptyState icon={CheckCircle2} title="Nothing here" sub="Follow-up visits are added automatically when a patient is discharged with a next-visit date, or manually from their Discharge tab." />}
      </Card>
    </div>
  );
}

/* ============================== REFERRAL REGISTER ============================== */
function ReferralRegisterView({ state, openPatient }) {
  const [scope, setScope] = useState("in");

  const inRows = useMemo(() => state.patients.filter((p) => p.referralIn).map((p) => ({ ...p.referralIn, patientId: p.id, patientName: p.name, mrn: p.mrn })), [state]);
  const outRows = useMemo(() => {
    const list = [];
    state.patients.forEach((p) => (p.referralsOut || []).forEach((r) => list.push({ ...r, patientId: p.id, patientName: p.name, mrn: p.mrn })));
    return list;
  }, [state]);

  const rows = (scope === "in" ? inRows : outRows).sort((a, b) => (a.date < b.date ? 1 : -1));

  return (
    <div>
      <TopBar title="Referral Register" sub="Patients coming from, or sent to, other facilities." />
      <div className="grid grid-cols-2 gap-3 mb-4">
        <StatCard label="Referred In" value={inRows.length} icon={RouteIcon} tone="blue" onClick={() => setScope("in")} />
        <StatCard label="Referred Out" value={outRows.length} icon={RouteIcon} tone="orange" onClick={() => setScope("out")} />
      </div>
      <div className="flex flex-wrap gap-2 mb-3">
        <Select value={scope} onChange={(e) => setScope(e.target.value)} className="max-w-[200px]">
          <option value="in">Referred In</option>
          <option value="out">Referred Out</option>
        </Select>
      </div>
      <Card className="overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead><tr className="text-left border-b" style={{ borderColor: C.line, background: C.paper }}>
              {(scope === "in"
                ? ["MRN", "Patient", "Referring Facility", "Referring Doctor", "Date", "Summary"]
                : ["MRN", "Patient", "Receiving Facility", "Receiving Doctor", "Date", "Reason"]
              ).map((h) => <th key={h} className="px-4 py-2 text-[11px] font-semibold uppercase tracking-wide" style={{ color: C.slate }}>{h}</th>)}
            </tr></thead>
            <tbody>
              {rows.map((r) => (
                <tr key={r.patientId + (r.id || "")} onClick={() => openPatient(r.patientId, "Referral")} className="border-b last:border-b-0 cursor-pointer hover:bg-black/[0.02]" style={{ borderColor: C.lineSoft }}>
                  <td className="px-4 py-2.5 font-mono text-xs" style={{ fontFamily: "IBM Plex Mono, monospace", color: C.teal }}>{r.mrn}</td>
                  <td className="px-4 py-2.5 font-semibold" style={{ color: C.ink }}>{r.patientName}</td>
                  <td className="px-4 py-2.5" style={{ color: C.ink }}>{r.facility}</td>
                  <td className="px-4 py-2.5" style={{ color: C.slate }}>{scope === "in" ? r.referringDoctor : r.receivingDoctor}</td>
                  <td className="px-4 py-2.5 font-mono text-xs" style={{ fontFamily: "IBM Plex Mono, monospace", color: C.slate }}>{fmtDate(r.date)}</td>
                  <td className="px-4 py-2.5 max-w-[260px] truncate" style={{ color: C.slate }}>{scope === "in" ? r.summary : r.reason}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        {rows.length === 0 && <EmptyState icon={RouteIcon} title="No entries yet" sub="Referrals are recorded from a patient's Referral tab." />}
      </Card>
    </div>
  );
}

/* ============================== STATISTICS (LIVE) ============================== */
function BarRow({ label, count, max, color }) {
  const pct = max ? Math.max(3, Math.round((count / max) * 100)) : 0;
  return (
    <div className="flex items-center gap-3">
      <div className="w-28 shrink-0 text-xs truncate" style={{ color: C.ink }}>{label}</div>
      <div className="flex-1 h-3 rounded-full overflow-hidden" style={{ background: C.lineSoft }}>
        <div className="h-full rounded-full" style={{ width: `${pct}%`, background: color }} />
      </div>
      <div className="w-8 text-right text-xs font-mono" style={{ fontFamily: "IBM Plex Mono, monospace", color: C.slate }}>{count}</div>
    </div>
  );
}

function StatisticsView({ state }) {
  const { patients, wards } = state;

  const ageBuckets = useMemo(() => {
    const buckets = [["0–17", 0], ["18–40", 0], ["41–60", 0], ["61+", 0]];
    patients.forEach((p) => {
      const a = Number(p.age) || 0;
      if (a < 18) buckets[0][1]++; else if (a <= 40) buckets[1][1]++; else if (a <= 60) buckets[2][1]++; else buckets[3][1]++;
    });
    return buckets;
  }, [patients]);

  const sexCounts = useMemo(() => {
    const c = { Male: 0, Female: 0, Other: 0 };
    patients.forEach((p) => { c[p.sex] = (c[p.sex] || 0) + 1; });
    return c;
  }, [patients]);

  const diagnosisCounts = useMemo(() => {
    const map = {};
    patients.forEach((p) => { const d = (p.diagnosis || "Unspecified").trim(); map[d] = (map[d] || 0) + 1; });
    return Object.entries(map).sort((a, b) => b[1] - a[1]).slice(0, 8);
  }, [patients]);

  const wardStats = useMemo(() => {
    return wards.map((w) => {
      const wp = patients.filter((p) => p.wardId === w.id);
      const withLos = wp.map((p) => daysBetween(p.dateOfAdmission, p.discharge?.dischargeDate));
      const avgLos = withLos.length ? (withLos.reduce((a, b) => a + b, 0) / withLos.length).toFixed(1) : "—";
      const outcomes = {};
      wp.forEach((p) => { if (p.discharge?.outcome) outcomes[p.discharge.outcome] = (outcomes[p.discharge.outcome] || 0) + 1; });
      return { ward: w, total: wp.length, admitted: wp.filter((p) => p.status === "admitted").length, discharged: wp.filter((p) => p.status === "discharged").length, avgLos, outcomes };
    });
  }, [patients, wards]);

  const totalDischarged = patients.filter((p) => p.status === "discharged").length;
  const allLos = patients.filter((p) => p.status === "discharged").map((p) => daysBetween(p.dateOfAdmission, p.discharge?.dischargeDate));
  const avgLosAll = allLos.length ? (allLos.reduce((a, b) => a + b, 0) / allLos.length).toFixed(1) : "—";
  const outcomeCounts = useMemo(() => {
    const map = {};
    patients.forEach((p) => { if (p.discharge?.outcome) map[p.discharge.outcome] = (map[p.discharge.outcome] || 0) + 1; });
    return map;
  }, [patients]);
  const maxAge = Math.max(1, ...ageBuckets.map((b) => b[1]));
  const maxDiag = Math.max(1, ...diagnosisCounts.map((d) => d[1]));
  const maxSex = Math.max(1, ...Object.values(sexCounts));

  return (
    <div>
      <TopBar title="Statistics" sub="Computed live from your data — no manual export to SPSS needed for a quick look." />
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
        <StatCard label="Total Patients" value={patients.length} icon={Users} tone="blue" />
        <StatCard label="Discharged" value={totalDischarged} icon={CheckCircle2} tone="green" />
        <StatCard label="Avg. Length of Stay" value={`${avgLosAll}d`} icon={Clock} tone="orange" />
        <StatCard label="Wards" value={wards.length} icon={Building2} tone="teal" />
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
        <Card className="p-4">
          <SectionTitle eyebrow="Demographics" title="Age Distribution" />
          <div className="flex flex-col gap-2.5">
            {ageBuckets.map(([label, count], i) => <BarRow key={label} label={label} count={count} max={maxAge} color={C.wardPalette[i % C.wardPalette.length]} />)}
          </div>
        </Card>
        <Card className="p-4">
          <SectionTitle eyebrow="Demographics" title="Sex Distribution" />
          <div className="flex flex-col gap-2.5">
            {Object.entries(sexCounts).filter(([, c]) => c > 0).map(([label, count], i) => <BarRow key={label} label={label} count={count} max={maxSex} color={C.wardPalette[(i + 2) % C.wardPalette.length]} />)}
          </div>
        </Card>
      </div>

      <Card className="p-4 mb-4">
        <SectionTitle eyebrow="Case Mix" title="Most Common Diagnoses" />
        <div className="flex flex-col gap-2.5">
          {diagnosisCounts.map(([label, count], i) => <BarRow key={label} label={label} count={count} max={maxDiag} color={C.wardPalette[i % C.wardPalette.length]} />)}
          {diagnosisCounts.length === 0 && <div className="text-xs" style={{ color: C.slate }}>No patients yet.</div>}
        </div>
      </Card>

      <Card className="p-4 mb-4">
        <SectionTitle eyebrow="Discharge" title="Outcomes (All Wards)" />
        <div className="flex flex-wrap gap-2">
          {Object.entries(outcomeCounts).length === 0 && <span className="text-xs" style={{ color: C.slate }}>No discharges recorded yet.</span>}
          {Object.entries(outcomeCounts).map(([label, count]) => (
            <Pill key={label} tone={label === "Deceased" ? "coral" : label === "Referred" || label === "Left Against Medical Advice" ? "amber" : "green"}>{label}: {count}</Pill>
          ))}
        </div>
      </Card>

      <Card className="overflow-hidden">
        <SectionTitle eyebrow="Wards" title="Ward-wise Outcomes" right={null} />
        <div className="overflow-x-auto px-0 pb-0">
          <table className="w-full text-sm">
            <thead><tr className="text-left border-b" style={{ borderColor: C.line, background: C.paper }}>
              {["Ward", "Total", "Admitted", "Discharged", "Avg LOS", "Outcomes"].map((h) => (
                <th key={h} className="px-4 py-2 text-[11px] font-semibold uppercase tracking-wide" style={{ color: C.slate }}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {wardStats.map((w) => (
                <tr key={w.ward.id} className="border-b last:border-b-0" style={{ borderColor: C.lineSoft }}>
                  <td className="px-4 py-2.5 font-semibold" style={{ color: C.ink }}>{w.ward.name}</td>
                  <td className="px-4 py-2.5" style={{ color: C.slate }}>{w.total}</td>
                  <td className="px-4 py-2.5" style={{ color: C.slate }}>{w.admitted}</td>
                  <td className="px-4 py-2.5" style={{ color: C.slate }}>{w.discharged}</td>
                  <td className="px-4 py-2.5 font-mono text-xs" style={{ fontFamily: "IBM Plex Mono, monospace", color: C.slate }}>{w.avgLos}{w.avgLos !== "—" ? "d" : ""}</td>
                  <td className="px-4 py-2.5">
                    {Object.keys(w.outcomes).length === 0 ? <span style={{ color: C.slate }}>—</span> :
                      <div className="flex flex-wrap gap-1">{Object.entries(w.outcomes).map(([o, c]) => <Pill key={o} tone={o === "Deceased" ? "coral" : "slate"}>{o}: {c}</Pill>)}</div>}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
}

/* ============================== RESEARCH MODULE ============================== */
function ResearchView({ state, gsheets }) {
  const [diagnosis, setDiagnosis] = useState("");
  const [sex, setSex] = useState("all");
  const [ageMin, setAgeMin] = useState("");
  const [ageMax, setAgeMax] = useState("");
  const [wardId, setWardId] = useState("all");
  const [outcome, setOutcome] = useState("all");

  const rows = state.patients.filter((p) => {
    if (diagnosis && !p.diagnosis.toLowerCase().includes(diagnosis.toLowerCase())) return false;
    if (sex !== "all" && p.sex !== sex) return false;
    if (ageMin && Number(p.age) < Number(ageMin)) return false;
    if (ageMax && Number(p.age) > Number(ageMax)) return false;
    if (wardId !== "all" && p.wardId !== wardId) return false;
    if (outcome !== "all" && p.status !== outcome) return false;
    return true;
  });

  function exportCsv() {
    const { header, rows: data } = cohortSheetRows(rows, state.wards);
    const lines = data.map((r) => r.map(csvEscape).join(","));
    downloadFile(`mediward-research-export-${todayISO()}.csv`, [header.join(","), ...lines].join("\n"), "text/csv");
  }

  function copyTsv() {
    const { header, rows: data } = cohortSheetRows(rows, state.wards);
    const tsv = [header, ...data].map((r) => r.join("\t")).join("\n");
    navigator.clipboard.writeText(tsv).then(
      () => alert("Copied — click a cell in any open Google Sheet and paste (Ctrl/Cmd+V)."),
      () => alert("Couldn't access the clipboard. Try Export CSV instead.")
    );
  }

  function syncCohortToSheets() {
    if (!gsheets.accessToken) { gsheets.connect(); return; }
    const { header, rows: data } = cohortSheetRows(rows, state.wards);
    gsheets.syncNow("Research Export", header, data);
  }

  return (
    <div>
      <TopBar title="Research Export" sub="Filter a cohort, then export a clean, standardized dataset — or push it straight to Google Sheets." />
      <Card className="p-4 mb-4">
        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-6 gap-2 items-end">
          <Field label="Diagnosis contains"><TextInput value={diagnosis} onChange={(e) => setDiagnosis(e.target.value)} placeholder="e.g. glioma" /></Field>
          <Field label="Sex"><Select value={sex} onChange={(e) => setSex(e.target.value)}><option value="all">All</option><option>Male</option><option>Female</option></Select></Field>
          <Field label="Age min"><TextInput type="number" value={ageMin} onChange={(e) => setAgeMin(e.target.value)} /></Field>
          <Field label="Age max"><TextInput type="number" value={ageMax} onChange={(e) => setAgeMax(e.target.value)} /></Field>
          <Field label="Ward"><Select value={wardId} onChange={(e) => setWardId(e.target.value)}><option value="all">All</option>{state.wards.map((w) => <option key={w.id} value={w.id}>{w.name}</option>)}</Select></Field>
          <Field label="Outcome"><Select value={outcome} onChange={(e) => setOutcome(e.target.value)}><option value="all">All</option><option value="admitted">Admitted</option><option value="discharged">Discharged</option></Select></Field>
        </div>
      </Card>
      <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
        <span className="text-sm" style={{ color: C.slate }}>{rows.length} patients match this cohort</span>
        <div className="flex gap-2 flex-wrap items-center">
          {gsheets.accessToken && <Pill tone="green">Sheets connected</Pill>}
          <Button variant="outline" icon={Download} onClick={exportCsv}>Export CSV</Button>
          <Button variant="outline" size="md" onClick={copyTsv}>Copy for Sheets (paste-ready)</Button>
          <Button variant="teal" icon={gsheets.syncing ? Loader2 : FolderSync} disabled={gsheets.syncing} onClick={syncCohortToSheets}>
            {gsheets.syncing ? "Syncing…" : gsheets.accessToken ? "Sync to Google Sheets" : "Connect & Sync to Sheets"}
          </Button>
        </div>
      </div>
      {gsheets.syncError && <div className="text-xs rounded-md p-2 mb-3" style={{ background: C.coralSoft, color: C.coral }}>{gsheets.syncError} — configure this under <b>Settings &amp; Sync</b>.</div>}
      {gsheets.lastSync && !gsheets.syncError && <div className="text-xs mb-3" style={{ color: C.slate }}>Last pushed to "Research Export" tab at {gsheets.lastSync.toLocaleTimeString()}.</div>}
      <Card className="overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead><tr className="text-left border-b" style={{ borderColor: C.line, background: C.paper }}>
              {["MRN", "Name", "Age/Sex", "Diagnosis", "Ward", "LOS", "Ops", "Outcome"].map((h) => <th key={h} className="px-4 py-2 text-[11px] font-semibold uppercase tracking-wide" style={{ color: C.slate }}>{h}</th>)}
            </tr></thead>
            <tbody>
              {rows.map((p) => {
                const ward = state.wards.find((w) => w.id === p.wardId);
                return (
                  <tr key={p.id} className="border-b last:border-b-0" style={{ borderColor: C.lineSoft }}>
                    <td className="px-4 py-2.5 font-mono text-xs" style={{ fontFamily: "IBM Plex Mono, monospace", color: C.teal }}>{p.mrn}</td>
                    <td className="px-4 py-2.5" style={{ color: C.ink }}>{p.name}</td>
                    <td className="px-4 py-2.5" style={{ color: C.slate }}>{p.age}/{p.sex?.[0]}</td>
                    <td className="px-4 py-2.5" style={{ color: C.ink }}>{p.diagnosis}</td>
                    <td className="px-4 py-2.5" style={{ color: C.slate }}>{ward?.name}</td>
                    <td className="px-4 py-2.5" style={{ color: C.slate }}>{daysBetween(p.dateOfAdmission, p.discharge?.dischargeDate)}d</td>
                    <td className="px-4 py-2.5" style={{ color: C.slate }}>{p.operations.length}</td>
                    <td className="px-4 py-2.5"><Pill tone={p.status === "admitted" ? "teal" : "green"}>{p.status}</Pill></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        {rows.length === 0 && <EmptyState icon={FlaskConical} title="No patients match this cohort" sub="Loosen the filters above." />}
      </Card>
    </div>
  );
}

/* ============================== AI SEARCH ============================== */
function parseQuery(q, state) {
  const ql = q.toLowerCase();
  let results = state.patients;
  const explain = [];

  const hbMatch = ql.match(/hb|hemoglobin/) && ql.match(/(under|below|less than)\s*(\d+(\.\d+)?)/);
  if (hbMatch) {
    const threshold = parseFloat(hbMatch[2]);
    results = results.filter((p) => p.investigations.some((i) => /hb|hemoglobin/i.test(i.name) && parseFloat(i.result) < threshold));
    explain.push(`Hb below ${threshold} g/dL`);
  }
  const wardMatch = state.wards.find((w) => ql.includes(w.name.toLowerCase()));
  if (wardMatch) { results = results.filter((p) => p.wardId === wardMatch.id); explain.push(`Ward: ${wardMatch.name}`); }

  const sexMatch = ql.includes(" male") || ql.startsWith("male") ? "Male" : ql.includes("female") ? "Female" : null;
  if (sexMatch) { results = results.filter((p) => p.sex === sexMatch); explain.push(`Sex: ${sexMatch}`); }

  ["glioma", "appendicitis", "pneumonia", "hematoma", "stroke", "vp shunt", "shunt", "acdf", "craniectomy", "craniotomy"].forEach((kw) => {
    if (ql.includes(kw)) { results = results.filter((p) => `${p.diagnosis} ${p.operations.map((o) => o.procedure).join(" ")}`.toLowerCase().includes(kw)); explain.push(`Keyword: "${kw}"`); }
  });
  const infMatch = ql.includes("infection") || ql.includes("complication");
  if (infMatch) {
    results = results.filter((p) => p.operations.some((o) => o.complication && o.complication.toLowerCase() !== "none"));
    explain.push("Has a recorded complication");
  }
  if (explain.length === 0) {
    results = results.filter((p) => `${p.name} ${p.mrn} ${p.diagnosis} ${p.consultant}`.toLowerCase().includes(ql));
    if (q) explain.push(`Free-text match on "${q}"`);
  }
  return { results, explain };
}
