/* ---- AI-assisted ICD-10 coding (simulated keyword suggester) ----
   No live coding API is reachable from a client-only artifact, so this
   matches diagnosis text against a compact keyword table. It's a starting
   suggestion for the clinician to verify, not an authoritative coder. */
const ICD10_TABLE = [
  [/gliom|glioblastom|astrocytom/i, "C71.9", "Malignant neoplasm of brain, unspecified"],
  [/subdural hematom|subdural haemorrhage/i, "S06.5X0A", "Traumatic subdural hemorrhage, initial encounter"],
  [/decompressive craniectom|traumatic brain injury|head injury/i, "S06.9X0A", "Unspecified intracranial injury, initial encounter"],
  [/appendicitis/i, "K35.80", "Unspecified acute appendicitis"],
  [/pneumonia/i, "J18.9", "Pneumonia, unspecified organism"],
  [/ischemic stroke|cerebral infarct|mca territory|cva\b/i, "I63.9", "Cerebral infarction, unspecified"],
  [/intracerebral hemorrhage|ich\b/i, "I61.9", "Nontraumatic intracerebral hemorrhage, unspecified"],
  [/laminectom|disc(ectomy)?|prolapsed disc|l4-?l5|l5-?s1/i, "M51.26", "Other intervertebral disc displacement, lumbar region"],
  [/vp shunt|hydrocephalus|shunt/i, "G91.9", "Hydrocephalus, unspecified"],
  [/copd|chronic obstructive/i, "J44.9", "Chronic obstructive pulmonary disease, unspecified"],
  [/diabet/i, "E11.9", "Type 2 diabetes mellitus without complications"],
  [/hypertens/i, "I10", "Essential (primary) hypertension"],
  [/urinary tract infection|\buti\b/i, "N39.0", "Urinary tract infection, site not specified"],
  [/cholecystitis|gallstone|cholelithiasis/i, "K80.20", "Calculus of gallbladder without cholecystitis"],
  [/fracture/i, "T14.8", "Other injury of unspecified body region"],
  [/sepsis/i, "A41.9", "Sepsis, unspecified organism"],
  [/malignan|carcinoma|tumou?r|cancer/i, "C80.1", "Malignant neoplasm, unspecified"],
];
function suggestIcd10(diagnosisText) {
  const text = diagnosisText || "";
  for (const [re, code, label] of ICD10_TABLE) {
    if (re.test(text)) return { code, label };
  }
  return null;
}

/* ---- Lab value flagging: parse a leading numeric value from a free-text
   result and compare it against optional reference-range bounds. ---- */
function parseNumericResult(resultText) {
  const m = String(resultText || "").replace(/,/g, "").match(/-?\d+(\.\d+)?/);
  return m ? parseFloat(m[0]) : null;
}
function flagInvestigation(inv) {
  if (inv.refLow === undefined && inv.refHigh === undefined) return null;
  if (inv.refLow === "" && inv.refHigh === "") return null;
  const val = parseNumericResult(inv.result);
  if (val === null) return null;
  const lo = inv.refLow !== "" && inv.refLow !== undefined ? parseFloat(inv.refLow) : null;
  const hi = inv.refHigh !== "" && inv.refHigh !== undefined ? parseFloat(inv.refHigh) : null;
  if (lo !== null && val < lo) return "low";
  if (hi !== null && val > hi) return "high";
  if (lo !== null || hi !== null) return "normal";
  return null;
}

/* ============================== AUTH ==============================
   Real accounts, no backend available in an artifact, so this is the most
   "real" auth achievable client-side:
   - Hospital Email: an account directory kept in this artifact's SHARED
     storage (so every teammate who opens this same artifact link shares one
     login system). Passwords are never stored in plain text — they're
     salted and run through PBKDF2-SHA256 (100k iterations) via the
     browser's real Web Crypto API before anything touches storage.
   - Google Sign-In: the real Google Identity Services "Sign in with Google"
     flow. The button is rendered by Google's own script and the credential
     that comes back is a genuine signed JWT from accounts.google.com — this
     app just decodes the (already-verified-by-Google) profile claims, it
     isn't a typed-in placeholder name.
   Session is kept in this artifact's personal storage and cleared on logout.
   A real production rollout would move this to Firebase Auth / an identity
   provider with server-verified sessions — see Settings → roadmap table.
======================================================================= */
const USERS_STORE_KEY = "mw-users-v1";
const SESSION_STORE_KEY = "mw-session-v1";

function normEmail(email) { return String(email || "").trim().toLowerCase(); }

function bufToHex(buf) {
  return Array.from(new Uint8Array(buf)).map((b) => b.toString(16).padStart(2, "0")).join("");
}
function hexToBuf(hex) {
  const arr = new Uint8Array(hex.length / 2);
  for (let i = 0; i < arr.length; i++) arr[i] = parseInt(hex.substr(i * 2, 2), 16);
  return arr;
}
function randomSaltHex(len = 16) {
  const arr = new Uint8Array(len);
  crypto.getRandomValues(arr);
  return bufToHex(arr);
}
async function hashPassword(password, saltHex) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password), { name: "PBKDF2" }, false, ["deriveBits"]);
  const bits = await crypto.subtle.deriveBits(
    { name: "PBKDF2", salt: hexToBuf(saltHex), iterations: 100000, hash: "SHA-256" },
    keyMaterial,
    256
  );
  return bufToHex(bits);
}

function decodeGoogleJwt(token) {
  try {
    const payload = token.split(".")[1];
    const base64 = payload.replace(/-/g, "+").replace(/_/g, "/");
    const json = decodeURIComponent(
      atob(base64)
        .split("")
        .map((c) => "%" + ("00" + c.charCodeAt(0).toString(16)).slice(-2))
        .join("")
    );
    return JSON.parse(json);
  } catch {
    return null;
  }
}

function HospitalSwitcherModal({ open, onClose, hospitals, activeId, onSwitch, onAdd, onRename, onDelete }) {
  const [newName, setNewName] = useState("");
  const [renamingId, setRenamingId] = useState(null);
  const [renameDraft, setRenameDraft] = useState("");
  const [justAddedId, setJustAddedId] = useState(null);

  function submitAdd() {
    const name = newName.trim();
    if (!name) return;
    const newId = onAdd(name);
    setNewName("");
    if (newId) { setJustAddedId(newId); setTimeout(() => setJustAddedId((v) => (v === newId ? null : v)), 3000); }
  }
  function handleNameKeyDown(e) {
    if (e.key === "Enter") { e.preventDefault(); submitAdd(); }
  }
  function commitRename(id) {
    onRename(id, renameDraft);
    setRenamingId(null);
  }

  return (
    <Modal open={open} onClose={onClose} title="Hospital Profiles">
      <p className="text-xs mb-3" style={{ color: C.slate }}>
        Switch between separate indoor ward setups under one login — each profile has its own wards, patients, MRNs, Op IDs, and Google Sheets connection.
      </p>
      <div className="flex flex-col gap-2 mb-4">
        {hospitals.map((h) => (
          <div key={h.id} className="flex items-center gap-2 p-2.5 rounded-md border" style={{ borderColor: h.id === activeId ? C.teal : C.line, background: h.id === activeId ? C.tealSoft : "#fff" }}>
            {renamingId === h.id ? (
              <input autoFocus value={renameDraft} onChange={(e) => setRenameDraft(e.target.value)}
                onKeyDown={(e) => { if (e.key === "Enter") commitRename(h.id); if (e.key === "Escape") setRenamingId(null); }}
                className="flex-1 text-sm outline-none border-b bg-transparent py-0.5" style={{ borderColor: C.teal, color: C.ink }} />
            ) : (
              <button type="button" onClick={() => onSwitch(h.id)} className="flex-1 text-left">
                <div className="text-sm font-semibold flex items-center gap-2" style={{ color: C.ink }}>
                  {h.name}{h.id === activeId && <Pill tone="teal">Active</Pill>}{h.id === justAddedId && <Pill tone="green">Added</Pill>}
                </div>
                <div className="text-[11px]" style={{ color: C.slate }}>{h.data.patients.length} patients · {h.data.wards.length} wards</div>
              </button>
            )}
            {renamingId === h.id ? (
              <button type="button" onClick={() => commitRename(h.id)}><CheckCircle2 size={15} style={{ color: C.teal }} /></button>
            ) : (
              <button type="button" onClick={() => { setRenamingId(h.id); setRenameDraft(h.name); }}><Pencil size={13} style={{ color: C.slate }} /></button>
            )}
            {hospitals.length > 1 && <button type="button" onClick={() => onDelete(h.id)}><Trash2 size={13} style={{ color: C.coral }} /></button>}
          </div>
        ))}
      </div>
      <div className="flex gap-2">
        <TextInput value={newName} onChange={(e) => setNewName(e.target.value)} onKeyDown={handleNameKeyDown} placeholder="New hospital name" />
        <Button type="button" variant="teal" icon={Plus} onClick={submitAdd}>Add Hospital</Button>
      </div>
      {justAddedId && <div className="text-[11px] mt-2" style={{ color: C.green }}>Added and switched to your new hospital — pick another profile above, or close this window to keep working here.</div>}
    </Modal>
  );
}

function CommandPalette({ open, onClose, patients, wards, onSelect }) {
  const [q, setQ] = useState("");
  const [activeIndex, setActiveIndex] = useState(0);
  const inputRef = useRef(null);

  useEffect(() => {
    if (open) {
      setQ(""); setActiveIndex(0);
      const t = setTimeout(() => inputRef.current?.focus(), 30);
      return () => clearTimeout(t);
    }
  }, [open]);

  const results = useMemo(() => {
    if (!q.trim()) return [...patients].sort((a, b) => (a.dateOfAdmission < b.dateOfAdmission ? 1 : -1)).slice(0, 8);
    const ql = q.toLowerCase();
    return patients.filter((p) => `${p.name} ${p.mrn} ${p.diagnosis}`.toLowerCase().includes(ql)).slice(0, 8);
  }, [q, patients]);

  function handleKey(e) {
    if (e.key === "ArrowDown") { e.preventDefault(); setActiveIndex((i) => Math.min(i + 1, results.length - 1)); }
    else if (e.key === "ArrowUp") { e.preventDefault(); setActiveIndex((i) => Math.max(i - 1, 0)); }
    else if (e.key === "Enter") { e.preventDefault(); if (results[activeIndex]) onSelect(results[activeIndex].id); }
    else if (e.key === "Escape") { onClose(); }
  }

  if (!open) return null;
  return (
    <div className="fixed inset-0 flex items-start justify-center pt-24 px-4" style={{ background: "rgba(15,37,64,0.5)", zIndex: 90 }} onClick={onClose}>
      <div className="w-full max-w-lg rounded-xl shadow-2xl overflow-hidden" style={{ background: "#fff" }} onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center gap-2 px-4 py-3 border-b" style={{ borderColor: C.line }}>
          <Search size={16} style={{ color: C.slate }} />
          <input ref={inputRef} value={q} onChange={(e) => { setQ(e.target.value); setActiveIndex(0); }} onKeyDown={handleKey}
            placeholder="Jump to a patient by name or MRN…" className="flex-1 text-sm outline-none bg-transparent" style={{ color: C.ink }} />
          <span className="text-[10px] px-1.5 py-0.5 rounded border" style={{ borderColor: C.line, color: C.slate }}>Esc</span>
        </div>
        <div className="max-h-80 overflow-y-auto">
          {results.length === 0 && <div className="px-4 py-6 text-center text-xs" style={{ color: C.slate }}>No patients match "{q}"</div>}
          {results.map((p, i) => {
            const ward = wards.find((w) => w.id === p.wardId);
            return (
              <button key={p.id} onClick={() => onSelect(p.id)} onMouseEnter={() => setActiveIndex(i)}
                className="w-full flex items-center gap-3 px-4 py-2.5 text-left"
                style={{ background: i === activeIndex ? C.tealSoft : "transparent" }}>
                <PatientAvatar src={p.photo} name={p.name} size={28} />
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-semibold truncate" style={{ color: C.ink }}>{p.name}</div>
                  <div className="text-[11px] font-mono" style={{ fontFamily: "IBM Plex Mono, monospace", color: C.slate }}>{p.mrn} · {ward?.name}</div>
                </div>
                <Pill tone={p.status === "admitted" ? "teal" : "green"}>{p.status}</Pill>
              </button>
            );
          })}
        </div>
        {!q.trim() && <div className="px-4 py-2 text-[11px] border-t" style={{ borderColor: C.lineSoft, color: C.slate }}>Showing most recent admissions — type to search all patients.</div>}
      </div>
    </div>
  );
}

        const res = await window.storage.get(`share:${token}`, true);

        if (data.expiresAt && Date.now() > data.expiresAt) { setStatus("expired"); return; }

function GoogleSignInButton({ clientId, onCredential, onError }) {
  const hostRef = useRef(null);
  const [ready, setReady] = useState(false);

  useEffect(() => {
    if (!clientId) return;
    let cancelled = false;
    let tries = 0;
    function tryInit() {
      if (cancelled) return;
      if (window.google && window.google.accounts && window.google.accounts.id) {
        try {
          window.google.accounts.id.initialize({
            client_id: clientId,
            callback: (resp) => {
              if (resp && resp.credential) onCredential(resp.credential);
              else onError("Google didn't return a credential — try again.");
            },
            auto_select: false,
          });
          if (hostRef.current) {
            hostRef.current.innerHTML = "";
            window.google.accounts.id.renderButton(hostRef.current, {
              theme: "filled_black", size: "large", shape: "pill", width: 296, text: "continue_with",
            });
          }
          setReady(true);
        } catch (e) {
          onError("Could not initialize Google Sign-In for this Client ID.");
        }
        return;
      }
      tries += 1;
      if (tries < 40) setTimeout(tryInit, 250);
      else onError("Google Identity Services hasn't loaded — check your connection and reload.");
    }
    tryInit();
    return () => { cancelled = true; };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [clientId]);

  return (
    <div>
      <div ref={hostRef} className="flex justify-center" />
      {!ready && <div className="text-[11px] text-center mt-2" style={{ color: "#7C93AA" }}>Loading Google Sign-In…</div>}
    </div>
  );
}

function AuthView({ onLogin, hospitalName, state, update }) {
  const [method, setMethod] = useState("google");
  const [mode, setMode] = useState("login"); // login | signup
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");

  const [loginEmail, setLoginEmail] = useState("");
  const [loginPassword, setLoginPassword] = useState("");

  const [suName, setSuName] = useState("");
  const [suEmail, setSuEmail] = useState("");
  const [suPassword, setSuPassword] = useState("");
  const [suConfirm, setSuConfirm] = useState("");
  const [suRole, setSuRole] = useState("Doctor");

  const [clientIdDraft, setClientIdDraft] = useState(state?.googleSheets?.clientId || "");
  const [showClientIdSetup, setShowClientIdSetup] = useState(false);
  const clientId = state?.googleSheets?.clientId || "";

  const [pendingGoogleProfile, setPendingGoogleProfile] = useState(null); // first-time Google sign-in needs a role
  const [googleRole, setGoogleRole] = useState("Doctor");

  const origin = typeof window !== "undefined" ? window.location.origin : "";
  const originUsable = origin && origin !== "null" && !origin.startsWith("null");

  function saveClientId() {
    update((s) => ({ ...s, googleSheets: { ...(s.googleSheets || {}), clientId: clientIdDraft.trim() } }));
    setShowClientIdSetup(false);
  }

  async function handleGoogleCredential(jwt) {
    setErr("");
    const profile = decodeGoogleJwt(jwt);
    if (!profile || !profile.email) { setErr("Couldn't read your Google profile — try again."); return; }
    setBusy(true);
    try {
      const dir = await loadUserDirectory();
      const key = normEmail(profile.email);
      const existing = dir[key];
      if (existing) {
        const session = { name: existing.name, email: existing.email, role: existing.role, method: "google", picture: profile.picture || "" };
        await saveSession(session);
        onLogin(session);
      } else {
        // First time this Google account has signed in here — needs a role, then we provision the account.
        setPendingGoogleProfile(profile);
        setGoogleRole("Doctor");
      }
    } finally {
      setBusy(false);
    }
  }

  async function finishGoogleSignup() {
    if (!pendingGoogleProfile) return;
    setBusy(true); setErr("");
    try {
      const dir = await loadUserDirectory();
      const key = normEmail(pendingGoogleProfile.email);
      dir[key] = {
        name: pendingGoogleProfile.name || pendingGoogleProfile.email,
        email: pendingGoogleProfile.email,
        role: googleRole,
        method: "google",
        sub: pendingGoogleProfile.sub,
        createdAt: Date.now(),
      };
      await saveUserDirectory(dir);
      const session = { name: dir[key].name, email: dir[key].email, role: dir[key].role, method: "google", picture: pendingGoogleProfile.picture || "" };
      await saveSession(session);
      onLogin(session);
    } catch {
      setErr("Couldn't create your account — try again.");
    } finally {
      setBusy(false);
    }
  }

  async function handleLogin(e) {
    e.preventDefault();
    setErr("");
    const email = normEmail(loginEmail);
    if (!email || !loginPassword) { setErr("Enter your email and password."); return; }
    setBusy(true);
    try {
      const dir = await loadUserDirectory();
      const rec = dir[email];
      if (!rec || rec.method !== "password") { setErr("No hospital-email account found with that address. Sign up first."); return; }
      const hash = await hashPassword(loginPassword, rec.salt);
      if (hash !== rec.passwordHash) { setErr("Incorrect password."); return; }
      const session = { name: rec.name, email: rec.email, role: rec.role, method: "password" };
      await saveSession(session);
      onLogin(session);
    } catch {
      setErr("Something went wrong signing you in — try again.");
    } finally {
      setBusy(false);
    }
  }

  async function handleSignup(e) {
    e.preventDefault();
    setErr("");
    const email = normEmail(suEmail);
    if (!suName.trim()) { setErr("Enter your name."); return; }
    if (!email || !email.includes("@")) { setErr("Enter a valid email address."); return; }
    if (suPassword.length < 8) { setErr("Password must be at least 8 characters."); return; }
    if (suPassword !== suConfirm) { setErr("Passwords don't match."); return; }
    setBusy(true);
    try {
      const dir = await loadUserDirectory();
      if (dir[email]) { setErr("An account with that email already exists — log in instead."); setBusy(false); return; }
      const salt = randomSaltHex();
      const passwordHash = await hashPassword(suPassword, salt);
      dir[email] = { name: suName.trim(), email: suEmail.trim(), role: suRole, method: "password", salt, passwordHash, createdAt: Date.now() };
      await saveUserDirectory(dir);
      const session = { name: dir[email].name, email: dir[email].email, role: dir[email].role, method: "password" };
      await saveSession(session);
      onLogin(session);
    } catch {
      setErr("Couldn't create your account — try again.");
    } finally {
      setBusy(false);
    }
  }

  return (
    <div className="min-h-screen flex items-center justify-center px-4 py-10" style={{ background: C.ink }}>
      <div className="w-full max-w-sm">
        <div className="flex items-center gap-2.5 mb-8 justify-center">
          <div className="h-10 w-10 rounded-lg flex items-center justify-center font-bold text-sm" style={{ background: C.teal, color: "#fff" }}>MW</div>
          <div>
            <div className="font-serif text-xl leading-none" style={{ color: "#fff", fontFamily: "Fraunces, serif" }}>MediWard AI</div>
            <div className="text-[11px] tracking-widest uppercase" style={{ color: "#8FA8BE" }}>IPMS</div>
          </div>
        </div>
        <Card className="p-6" style={{ background: "#152E4C", borderColor: "#26456A" }}>
          <div className="text-xs mb-4" style={{ color: "#B7C6D6" }}>{hospitalName}</div>

          {pendingGoogleProfile ? (
            <div className="flex flex-col gap-3">
              <div className="text-sm" style={{ color: "#fff" }}>Welcome, {pendingGoogleProfile.name || pendingGoogleProfile.email}.</div>
              <div className="text-xs" style={{ color: "#B7C6D6" }}>First time here — pick your role to finish setting up your account.</div>
              <select value={googleRole} onChange={(e) => setGoogleRole(e.target.value)} className="w-full rounded-md px-3 py-2 text-sm outline-none" style={{ background: "#0F2540", color: "#fff", border: "1px solid #2C4C71" }}>
                {["Admin", "Doctor", "Intern", "Data Entry"].map((r) => <option key={r}>{r}</option>)}
              </select>
              {err && <div className="text-xs" style={{ color: "#E39D8F" }}>{err}</div>}
              <Button variant="teal" size="lg" disabled={busy} onClick={finishGoogleSignup}>{busy ? "Setting up…" : "Finish sign-in"}</Button>
              <button className="text-[11px] text-center" style={{ color: "#7C93AA" }} onClick={() => setPendingGoogleProfile(null)}>Cancel</button>
            </div>
          ) : (
            <>
              <div className="flex rounded-md overflow-hidden mb-4 border" style={{ borderColor: "#2C4C71" }}>
                {["google", "hospital"].map((m) => (
                  <button key={m} onClick={() => { setMethod(m); setErr(""); }} className="flex-1 py-2 text-xs font-semibold"
                    style={{ background: method === m ? C.teal : "transparent", color: method === m ? "#fff" : "#B7C6D6" }}>
                    {m === "google" ? "Google Sign-In" : "Hospital Email"}
                  </button>
                ))}
              </div>

              {method === "google" ? (
                <div className="flex flex-col gap-3">
                  {!originUsable && (
                    <div className="text-[11px] rounded-md p-2.5" style={{ background: "#3A2A16", color: "#E8C98B" }}>
                      This preview's origin isn't a fixed URL Google can authorize. Open this file from a stable origin (a local server, GitHub Pages, or any hosting) to complete Google sign-in.
                    </div>
                  )}
                  {!clientId ? (
                    <div className="flex flex-col gap-2">
                      <div className="text-[11px] leading-relaxed" style={{ color: "#B7C6D6" }}>
                        Google Sign-In needs a Google OAuth Client ID for this deployment (one-time setup, ~2 minutes).
                      </div>
                      <Button variant="outline" size="sm" onClick={() => setShowClientIdSetup((v) => !v)} style={{ borderColor: "#2C4C71", color: "#fff" }}>
                        {showClientIdSetup ? "Hide setup" : "Set up Google Sign-In"}
                      </Button>
                      {showClientIdSetup && (
                        <div className="flex flex-col gap-2 rounded-md p-3" style={{ background: "#0F2540", border: "1px solid #2C4C71" }}>
                          <input placeholder="xxxxxxxx.apps.googleusercontent.com" value={clientIdDraft} onChange={(e) => setClientIdDraft(e.target.value)}
                            className="w-full rounded-md px-3 py-2 text-sm outline-none" style={{ background: "#152E4C", color: "#fff", border: "1px solid #2C4C71" }} />
                          <ol className="text-[11px] leading-relaxed" style={{ color: "#7C93AA", listStyle: "decimal", marginLeft: "1.1rem" }}>
                            <li>At console.cloud.google.com, create an OAuth Client ID (Web application).</li>
                            <li>Add this origin under Authorized JavaScript origins: <code style={{ fontFamily: "IBM Plex Mono, monospace" }}>{origin || "(open from a real URL first)"}</code></li>
                            <li>Paste the Client ID above and save.</li>
                          </ol>
                          <Button variant="teal" size="sm" onClick={saveClientId} disabled={!clientIdDraft.trim()}>Save Client ID</Button>
                        </div>
                      )}
                    </div>
                  ) : (
                    <>
                      <GoogleSignInButton clientId={clientId} onCredential={handleGoogleCredential} onError={setErr} />
                      <button className="text-[11px] text-center" style={{ color: "#7C93AA" }} onClick={() => setShowClientIdSetup((v) => !v)}>
                        Wrong Google project? Change Client ID
                      </button>
                      {showClientIdSetup && (
                        <div className="flex flex-col gap-2 rounded-md p-3" style={{ background: "#0F2540", border: "1px solid #2C4C71" }}>
                          <input placeholder="xxxxxxxx.apps.googleusercontent.com" value={clientIdDraft} onChange={(e) => setClientIdDraft(e.target.value)}
                            className="w-full rounded-md px-3 py-2 text-sm outline-none" style={{ background: "#152E4C", color: "#fff", border: "1px solid #2C4C71" }} />
                          <Button variant="teal" size="sm" onClick={saveClientId} disabled={!clientIdDraft.trim()}>Save Client ID</Button>
                        </div>
                      )}
                    </>
                  )}
                  {err && <div className="text-xs" style={{ color: "#E39D8F" }}>{err}</div>}
                  <p className="text-[11px] leading-relaxed" style={{ color: "#7C93AA" }}>
                    This is the real Google Identity Services sign-in flow — the same Client ID configured in Settings → Cloud Sync also powers Google Sheets sync.
                  </p>
                </div>
              ) : mode === "login" ? (
                <form onSubmit={handleLogin} className="flex flex-col gap-3">
                  <input type="email" autoComplete="username" placeholder="you@hospital.org" value={loginEmail} onChange={(e) => setLoginEmail(e.target.value)}
                    className="w-full rounded-md px-3 py-2 text-sm outline-none" style={{ background: "#0F2540", color: "#fff", border: "1px solid #2C4C71" }} />
                  <input type="password" autoComplete="current-password" placeholder="Password" value={loginPassword} onChange={(e) => setLoginPassword(e.target.value)}
                    className="w-full rounded-md px-3 py-2 text-sm outline-none" style={{ background: "#0F2540", color: "#fff", border: "1px solid #2C4C71" }} />
                  {err && <div className="text-xs" style={{ color: "#E39D8F" }}>{err}</div>}
                  <Button type="submit" variant="teal" size="lg" disabled={busy}>{busy ? "Signing in…" : "Sign In"}</Button>
                  <button type="button" className="text-[11px] text-center" style={{ color: "#7C93AA" }} onClick={() => { setMode("signup"); setErr(""); }}>
                    Don't have an account? Sign up
                  </button>
                </form>
              ) : (
                <form onSubmit={handleSignup} className="flex flex-col gap-3">
                  <input placeholder="Full name" value={suName} onChange={(e) => setSuName(e.target.value)}
                    className="w-full rounded-md px-3 py-2 text-sm outline-none" style={{ background: "#0F2540", color: "#fff", border: "1px solid #2C4C71" }} />
                  <input type="email" autoComplete="username" placeholder="you@hospital.org" value={suEmail} onChange={(e) => setSuEmail(e.target.value)}
                    className="w-full rounded-md px-3 py-2 text-sm outline-none" style={{ background: "#0F2540", color: "#fff", border: "1px solid #2C4C71" }} />
                  <input type="password" autoComplete="new-password" placeholder="Password (min. 8 characters)" value={suPassword} onChange={(e) => setSuPassword(e.target.value)}
                    className="w-full rounded-md px-3 py-2 text-sm outline-none" style={{ background: "#0F2540", color: "#fff", border: "1px solid #2C4C71" }} />
                  <input type="password" autoComplete="new-password" placeholder="Confirm password" value={suConfirm} onChange={(e) => setSuConfirm(e.target.value)}
                    className="w-full rounded-md px-3 py-2 text-sm outline-none" style={{ background: "#0F2540", color: "#fff", border: "1px solid #2C4C71" }} />
                  <select value={suRole} onChange={(e) => setSuRole(e.target.value)} className="w-full rounded-md px-3 py-2 text-sm outline-none" style={{ background: "#0F2540", color: "#fff", border: "1px solid #2C4C71" }}>
                    {["Admin", "Doctor", "Intern", "Data Entry"].map((r) => <option key={r}>{r}</option>)}
                  </select>
                  {err && <div className="text-xs" style={{ color: "#E39D8F" }}>{err}</div>}
                  <Button type="submit" variant="teal" size="lg" disabled={busy}>{busy ? "Creating account…" : "Create Account"}</Button>
                  <button type="button" className="text-[11px] text-center" style={{ color: "#7C93AA" }} onClick={() => { setMode("login"); setErr(""); }}>
                    Already have an account? Log in
                  </button>
                </form>
              )}

              <p className="text-[11px] mt-4 leading-relaxed" style={{ color: "#7C93AA" }}>
                Passwords are salted and hashed (PBKDF2-SHA256) before they're stored — this workspace never keeps a plain-text password. Accounts live in this artifact's shared data store, so any teammate opening this same link can sign up and log in.
              </p>
            </>
          )}
        </Card>
      </div>
    </div>
  );
}

/* ============================== DASHBOARD ============================== */
function DashboardView({ state, setRoute, openPatient }) {
  const { patients, wards } = state;
  const admitted = patients.filter((p) => p.status === "admitted");
  const today = todayISO();
  const todayAdmissions = patients.filter((p) => p.dateOfAdmission === today);
  const todayDischarges = patients.filter((p) => p.discharge?.dischargeDate === today);
  const icuCount = admitted.filter((p) => wards.find((w) => w.id === p.wardId)?.name === "ICU").length;
  const emergencyCount = admitted.filter((p) => /emergency|acute|trauma/i.test(p.diagnosis)).length;
  const pendingInv = patients.reduce((n, p) => n + p.investigations.filter((i) => i.status !== "Reviewed").length, 0);
  const pendingOps = patients.reduce((n, p) => n + p.operations.filter((o) => o.status === "planned").length, 0);
  const overdueTasks = patients.reduce((n, p) => n + (p.tasks || []).filter((t) => !t.done && t.dueDate && t.dueDate < today).length, 0);
  const dueFollowUps = patients.reduce((n, p) => n + (p.followUps || []).filter((f) => f.status === "scheduled" && f.date <= today).length, 0);
  const totalBeds = wards.reduce((n, w) => n + (w.beds || 0), 0);
  const occupied = admitted.length;
  const occupancyPct = totalBeds ? Math.round((occupied / totalBeds) * 100) : 0;

  const wardStats = wards.map((w) => {
    const count = admitted.filter((p) => p.wardId === w.id).length;
    return { ward: w, count, pct: w.beds ? Math.min(100, Math.round((count / w.beds) * 100)) : 0 };
  });

  return (
    <div>
      <TopBar title="Ward Dashboard" sub={`${state.hospitalName} · ${new Date().toLocaleDateString("en-GB", { weekday: "long", day: "2-digit", month: "long", year: "numeric" })}`}
        right={<Button variant="teal" icon={UserPlus} onClick={() => setRoute("register")}>Admit Patient</Button>} />

      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
        <StatCard label="Total Admitted" value={admitted.length} sub={`${wards.length} wards`} icon={Bed} tone="blue" />
        <StatCard label="Today's Admission" value={todayAdmissions.length} icon={UserPlus} tone="green" />
        <StatCard label="Today's Discharge" value={todayDischarges.length} icon={CheckCircle2} tone="teal" />
        <StatCard label="ICU Patients" value={icuCount} icon={HeartPulse} tone="red" />
      </div>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
        <StatCard label="Emergency Cases" value={emergencyCount} icon={AlertTriangle} tone="red" />
        <StatCard label="Pending Investigations" value={pendingInv} icon={FlaskConical} tone="orange" />
        <StatCard label="Pending Operations" value={pendingOps} icon={Scissors} tone="orange" onClick={() => setRoute("operationList")} />
        <StatCard label="Bed Occupancy" value={`${occupancyPct}%`} sub={`${occupied}/${totalBeds} beds`} icon={Activity} tone="blue" />
      </div>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
        <StatCard label="Overdue Tasks" value={overdueTasks} icon={ClipboardList} tone="red" onClick={() => setRoute("tasks")} />
        <StatCard label="Follow-ups Due" value={dueFollowUps} icon={Clock} tone="orange" onClick={() => setRoute("followups")} />
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <Card className="p-4 lg:col-span-2">
          <SectionTitle eyebrow="Wards" title="Occupancy by Ward" />
          <div className="flex flex-col gap-3">
            {wardStats.map((ws, i) => (
              <div key={ws.ward.id}>
                <div className="flex justify-between text-xs mb-1">
                  <span className="font-medium" style={{ color: C.ink }}>{ws.ward.name}</span>
                  <span style={{ color: C.slate }}>{ws.count}/{ws.ward.beds} beds</span>
                </div>
                <div className="h-2 rounded-full overflow-hidden" style={{ background: C.lineSoft }}>
                  <div className="h-full rounded-full" style={{ width: `${ws.pct}%`, background: C.wardPalette[i % C.wardPalette.length] }} />
                </div>
              </div>
            ))}
          </div>
        </Card>

        <Card className="p-4">
          <SectionTitle eyebrow="Ward" title="Recent Admissions" />
          <div className="flex flex-col gap-2 max-h-72 overflow-y-auto">
            {[...patients].sort((a, b) => (a.dateOfAdmission < b.dateOfAdmission ? 1 : -1)).slice(0, 6).map((p) => {
              const ward = wards.find((w) => w.id === p.wardId);
              return (
                <button key={p.id} onClick={() => openPatient(p.id)} className="flex items-center justify-between gap-2 p-2 rounded-md text-left hover:bg-black/[0.03]">
                  <div className="flex items-center gap-2.5">
                    <PatientAvatar src={p.photo} name={p.name} size={30} />

                      <div className="text-[13px] font-semibold" style={{ color: C.ink }}>{p.name}</div>
                      <div className="text-[11px] font-mono" style={{ color: C.slate, fontFamily: "IBM Plex Mono, monospace" }}>{p.mrn} · {ward?.name}</div>
                    </div>
                  </div>
                  <Pill tone={p.status === "admitted" ? "teal" : "green"}>{p.status}</Pill>
                </button>
              );
            })}
          </div>
        </Card>
      </div>
    </div>
  );
}

/* ============================== WARD MANAGEMENT ============================== */
function WardsView({ state, update }) {
  const [newName, setNewName] = useState("");
  const [newBeds, setNewBeds] = useState(20);
  const [q, setQ] = useState("");
  const [editing, setEditing] = useState(null);

  const wards = [...state.wards].sort((a, b) => a.order - b.order).filter((w) => w.name.toLowerCase().includes(q.toLowerCase()));

  function addWard() {
    if (!newName.trim()) return;
    update((s) => ({ ...s, wards: [...s.wards, { id: uid("wd"), name: newName.trim(), order: s.wards.length, beds: Number(newBeds) || 10 }] }));
    setNewName(""); setNewBeds(20);
  }
  function removeWard(id) {
    const inUse = state.patients.some((p) => p.wardId === id && p.status === "admitted");
    if (inUse) { alert("Cannot delete — this ward has admitted patients."); return; }
    update((s) => ({ ...s, wards: s.wards.filter((w) => w.id !== id) }));
  }
  function move(id, dir) {
    update((s) => {
      const sorted = [...s.wards].sort((a, b) => a.order - b.order);
      const idx = sorted.findIndex((w) => w.id === id);
      const swap = idx + dir;
      if (swap < 0 || swap >= sorted.length) return s;
      [sorted[idx].order, sorted[swap].order] = [sorted[swap].order, sorted[idx].order];
      return { ...s, wards: sorted };
    });
  }

  return (
    <div>
      <TopBar title="Ward Management" sub="Add, rename, reorder, or retire wards." />
      <Card className="p-4 mb-4">
        <div className="grid grid-cols-1 sm:grid-cols-[1fr_120px_auto] gap-2">
          <TextInput placeholder="New ward name, e.g. Orthopaedic Ward" value={newName} onChange={(e) => setNewName(e.target.value)} />
          <TextInput type="number" placeholder="Beds" value={newBeds} onChange={(e) => setNewBeds(e.target.value)} />
          <Button variant="teal" icon={Plus} onClick={addWard}>Add Ward</Button>
        </div>
      </Card>
      <div className="mb-3">
        <TextInput placeholder="Search wards…" value={q} onChange={(e) => setQ(e.target.value)} className="max-w-xs" />
      </div>
      <Card>
        {wards.map((w, i) => {
          const count = state.patients.filter((p) => p.wardId === w.id && p.status === "admitted").length;
          return (
            <div key={w.id} className="flex items-center gap-3 px-4 py-3 border-b last:border-b-0" style={{ borderColor: C.lineSoft }}>
              <GripVertical size={14} style={{ color: C.slate }} />
              <div className="h-6 w-6 rounded flex items-center justify-center" style={{ background: C.wardPalette[i % C.wardPalette.length] + "22" }}>
                <Bed size={13} style={{ color: C.wardPalette[i % C.wardPalette.length] }} />
              </div>
              {editing === w.id ? (
                <input autoFocus defaultValue={w.name} onBlur={(e) => { update((s) => ({ ...s, wards: s.wards.map((x) => x.id === w.id ? { ...x, name: e.target.value || x.name } : x) })); setEditing(null); }}
                  onKeyDown={(e) => e.key === "Enter" && e.target.blur()}
                  className="text-sm font-medium border-b outline-none bg-transparent" style={{ color: C.ink, borderColor: C.teal }} />
              ) : (
                <span className="text-sm font-medium flex-1" style={{ color: C.ink }}>{w.name}</span>
              )}
              <span className="text-xs font-mono" style={{ color: C.slate, fontFamily: "IBM Plex Mono, monospace" }}>{count}/{w.beds} beds</span>
              <button onClick={() => move(w.id, -1)} className="p-1 hover:bg-black/5 rounded"><ChevronLeft size={14} style={{ color: C.slate }} /></button>
              <button onClick={() => move(w.id, 1)} className="p-1 hover:bg-black/5 rounded"><ChevronRight size={14} style={{ color: C.slate }} /></button>
              <button onClick={() => setEditing(w.id)} className="p-1 hover:bg-black/5 rounded"><Pencil size={13} style={{ color: C.slate }} /></button>
              <button onClick={() => removeWard(w.id)} className="p-1 hover:bg-black/5 rounded"><Trash2 size={13} style={{ color: C.coral }} /></button>
            </div>
          );
        })}
        {wards.length === 0 && <EmptyState icon={Building2} title="No wards match" sub="Try a different search term." />}
      </Card>
    </div>
  );
}

                  <th key={h} className="px-4 py-2.5 text-[11px] font-semibold uppercase tracking-wide" style={{ color: C.slate }}>{h}</th>

                    <td className="px-4 py-2.5" style={{ color: C.slate }}>{ward?.name} · {p.bedNumber}</td>
                    <td className="px-4 py-2.5 max-w-[220px] truncate" style={{ color: C.ink }}>{p.diagnosis}</td>
                    <td className="px-4 py-2.5" style={{ color: C.slate }}>{p.consultant}</td>

/* ============================== REGISTER PATIENT ============================== */
const BLANK_PATIENT = () => ({
  name: "", age: "", sex: "Male", address: "", phone: "", guardian: "", hospRegNo: "",
  bedNumber: "", wardId: "", consultant: "", diagnosis: "", dateOfAdmission: todayISO(),
  admissionTime: nowTime(), bloodGroup: "", allergy: "", comorbidity: "", weight: "", height: "", photo: null,
});

function RegisterView({ state, update, onDone, prefill }) {
  const [f, setF] = useState({ ...BLANK_PATIENT(), ...(prefill || {}), wardId: prefill?.wardId || state.wards[0]?.id || "" });
  const set = (k) => (e) => setF((s) => ({ ...s, [k]: e.target.value }));
  const bmi = calcBMI(f.weight, f.height);

  const [ocrStage, setOcrStage] = useState("idle"); // idle | scanning | done
  const [ocrFileName, setOcrFileName] = useState("");
  const ocrFileRef = useRef(null);

  function pickOcrFile(e) {
    const file = e.target.files?.[0];
    if (file) setOcrFileName(file.name);
  }
  function scanAdmissionDoc() {
    setOcrStage("scanning");
    setTimeout(() => {
      const ex = simulateOcr("Admission Sheet");
      setF((s) => ({
        ...s,
        name: ex.fields.name || s.name,
        age: ex.fields.age || s.age,
        sex: ex.fields.sex || s.sex,
        diagnosis: ex.fields.diagnosis || s.diagnosis,
        bloodGroup: ex.fields.bloodGroup || s.bloodGroup,
        allergy: ex.fields.allergy || s.allergy,
        weight: ex.fields.weight || s.weight,
        height: ex.fields.height || s.height,
      }));
      setOcrStage("done");
    }, 1300);
  }

  function submit(e) {
    e.preventDefault();
    if (!f.name || !f.age || !f.wardId) { alert("Name, age and ward are required."); return; }
    update((s) => {
      const year = new Date(f.dateOfAdmission).getFullYear() || s.mrnYear;
      const seq = s.mrnCounter + 1;
      const mrn = genMRN(year, seq);
      const patient = { id: uid("pt"), status: "admitted", investigations: [], medications: [], progressNotes: [], operations: [], discharge: null, tasks: [], followUps: [], referralIn: null, referralsOut: [], icd10: "", bmi, mrn, ...f };
      return { ...s, mrnCounter: seq, patients: [patient, ...s.patients], audit: [{ id: uid("log"), ts: Date.now(), text: `Registered patient ${mrn} — ${f.name}` }, ...s.audit] };
    });
    onDone();
  }

  return (
    <div>
      <TopBar title="Patient Registration" sub="Every patient receives a unique, permanent MediWard ID (MW-YYYY-000001). Scan an admission sheet with AI or fill the form manually." />

      <Card className="p-5 mb-4" style={{ borderColor: ocrStage === "done" ? C.teal : C.line }}>
        <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
          <div className="flex items-center gap-2">
            <div className="h-8 w-8 rounded-md flex items-center justify-center" style={{ background: C.tealSoft }}>
              <ScanLine size={15} style={{ color: C.teal }} />
            </div>
            <div>
              <div className="text-sm font-semibold" style={{ color: C.ink }}>AI OCR Upload</div>
              <div className="text-[11px]" style={{ color: C.slate }}>Photograph the admission sheet instead of typing it in</div>
            </div>
          </div>
          {ocrStage === "done" && <Pill tone="teal">Fields auto-filled below — review before saving</Pill>}
        </div>
        <div className="flex flex-wrap items-center gap-3">
          <Button type="button" size="sm" variant="outline" icon={Camera} onClick={() => ocrFileRef.current?.click()}>
            {ocrFileName || "Choose photo / PDF"}
          </Button>
          <input ref={ocrFileRef} type="file" accept="image/*,application/pdf" className="hidden" onChange={pickOcrFile} />
          <Button type="button" size="sm" variant="teal" icon={ocrStage === "scanning" ? Loader2 : Sparkles} disabled={ocrStage === "scanning"} onClick={scanAdmissionDoc}>
            {ocrStage === "scanning" ? "Scanning with Gemini OCR…" : "Scan with AI"}
          </Button>
          <span className="text-[11px]" style={{ color: C.slate }}>Printed, handwritten, or mixed admission sheets supported. Need labs, prescriptions, or op notes instead? Use <b>AI OCR Upload</b> in the sidebar after registering.</span>
        </div>
      </Card>

      <form onSubmit={submit}>
        <Card className="p-5">
          <div className="mb-4 pb-4 border-b" style={{ borderColor: C.lineSoft }}>
            <div className="text-[11px] font-semibold uppercase tracking-wide mb-2" style={{ color: C.slate }}>Patient Photo (optional)</div>
            <PhotoUploadField name={f.name} value={f.photo} onChange={(dataUrl) => setF((s) => ({ ...s, photo: dataUrl }))} />
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
            <Field label="Patient Name" full><TextInput required value={f.name} onChange={set("name")} /></Field>
            <Field label="Age"><TextInput required type="number" value={f.age} onChange={set("age")} /></Field>
            <Field label="Sex"><Select value={f.sex} onChange={set("sex")}><option>Male</option><option>Female</option><option>Other</option></Select></Field>
            <Field label="Phone"><TextInput value={f.phone} onChange={set("phone")} /></Field>
            <Field label="Address" full><TextInput value={f.address} onChange={set("address")} /></Field>
            <Field label="Guardian"><TextInput value={f.guardian} onChange={set("guardian")} /></Field>
            <Field label="Hospital Reg. No."><TextInput value={f.hospRegNo} onChange={set("hospRegNo")} /></Field>
            <Field label="Ward">
              <Select required value={f.wardId} onChange={set("wardId")}>
                <option value="">Select ward</option>
                {state.wards.map((w) => <option key={w.id} value={w.id}>{w.name}</option>)}
              </Select>
            </Field>

/* ============================== AI OCR VIEW ============================== */
function OcrView({ state, update, goRegisterWithPrefill }) {
  const [docType, setDocType] = useState("Admission Sheet");
  const [stage, setStage] = useState("idle"); // idle | scanning | done
  const [extracted, setExtracted] = useState(null);
  const [fileName, setFileName] = useState("");
  const [targetPatientId, setTargetPatientId] = useState("");
  const fileRef = useRef(null);

  function pickFile(e) {
    const f = e.target.files?.[0];
    if (f) setFileName(f.name);
  }
  function scan() {
    setStage("scanning");
    setExtracted(null);
    setTimeout(() => {
      setExtracted(simulateOcr(docType));
      setStage("done");
    }, 1400);
  }

  function saveToRecord() {
    if (docType === "Admission Sheet") {
      goRegisterWithPrefill({
        name: extracted.fields.name, age: extracted.fields.age, sex: extracted.fields.sex,
        diagnosis: extracted.fields.diagnosis, bloodGroup: extracted.fields.bloodGroup,
        allergy: extracted.fields.allergy, weight: extracted.fields.weight, height: extracted.fields.height,
      });
      return;
    }
    if (!targetPatientId) { alert("Select a patient to attach this record to."); return; }
    update((s) => {
      const isOpNote = docType === "Operation Note";
      const opSeq = isOpNote ? (s.opIdCounter || 0) + 1 : s.opIdCounter;
      const newOpId = isOpNote ? genOpId(new Date().getFullYear(), opSeq) : null;
      return {
        ...s,
        opIdCounter: opSeq,
        patients: s.patients.map((p) => {
          if (p.id !== targetPatientId) return p;
          if (docType === "Laboratory Report") {
            const invs = extracted.fields.panel.map((row) => ({ id: uid("inv"), date: todayISO(), name: row.param, result: `${row.value} ${row.unit}`, status: "Pending Review", originalText: extracted.originalText }));
            return { ...p, investigations: [...invs, ...p.investigations] };
          }
          if (docType === "Prescription") {
            const meds = extracted.fields.medicines.map((m) => ({ id: uid("med"), drug: m.drug, dose: m.dose, route: m.route, frequency: m.frequency, start: todayISO(), stop: "" }));
            return { ...p, medications: [...meds, ...p.medications] };
          }
          if (docType === "Operation Note") {
            const op = { id: uid("op"), opId: newOpId, status: "completed", priority: "Emergency", date: todayISO(), otNumber: "", surgeon: extracted.fields.surgeon, assistant: "", anaesthesia: extracted.fields.anaesthesia, procedure: extracted.fields.procedure, implant: "", bloodLoss: extracted.fields.bloodLoss, duration: extracted.fields.duration, complication: extracted.fields.complication, specimen: "", drain: "", closure: "", postOpAdvice: "" };
            return { ...p, operations: [op, ...p.operations] };
          }
          if (docType === "Discharge Summary") {
            return { ...p, discharge: { ...(p.discharge || {}), finalDiagnosis: extracted.fields.finalDiagnosis, followUp: extracted.fields.followUp } };
          }
          if (docType === "Nursing Sheet" || docType === "Radiology Report") {
            const inv = { id: uid("inv"), date: todayISO(), name: docType === "Radiology Report" ? extracted.fields.study : "Nursing Vitals", result: docType === "Radiology Report" ? extracted.fields.finding : extracted.fields.vitals, status: "Reviewed", originalText: extracted.originalText };
            return { ...p, investigations: [inv, ...p.investigations] };
          }
          return p;
        }),
        audit: [{ id: uid("log"), ts: Date.now(), text: `AI OCR (${docType}) attached to patient record` }, ...s.audit],
      };
    });
    alert("Saved to patient record.");
    setExtracted(null); setStage("idle"); setFileName("");
  }

  return (
    <div>
      <TopBar title="AI OCR Upload" sub="Photograph a chart, prescription, or report — extraction is simulated in this prototype; wiring the Gemini API is the only change needed for live OCR." />
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <Card className="p-5">
          <SectionTitle eyebrow="Step 1" title="Upload document" />
          <div className="flex flex-wrap gap-1.5 mb-4">
            {DOC_TYPES.map((d) => (
              <button key={d} onClick={() => { setDocType(d); setExtracted(null); setStage("idle"); }}
                className="text-xs px-2.5 py-1.5 rounded-md font-medium border"
                style={{ background: docType === d ? C.tealSoft : "#fff", color: docType === d ? C.tealDark : C.slate, borderColor: docType === d ? C.teal : C.line }}>
                {d}
              </button>
            ))}
          </div>
          <div className="border-2 border-dashed rounded-lg flex flex-col items-center justify-center gap-2 py-10 mb-4" style={{ borderColor: C.line }}>
            <Camera size={22} style={{ color: C.teal }} />
            <div className="text-sm font-medium" style={{ color: C.ink }}>{fileName || "Take a photo or choose a file"}</div>
            <div className="text-[11px]" style={{ color: C.slate }}>Printed, handwritten, mixed, tables, or forms — all supported</div>
            <div className="flex gap-2 mt-1">
              <Button size="sm" variant="outline" icon={Upload} onClick={() => fileRef.current?.click()}>Choose File</Button>
              <input ref={fileRef} type="file" accept="image/*,application/pdf" className="hidden" onChange={pickFile} />
            </div>
          </div>
          <Button variant="teal" icon={stage === "scanning" ? Loader2 : Sparkles} disabled={stage === "scanning"} onClick={scan} className="w-full">
            {stage === "scanning" ? "Scanning with Gemini OCR…" : "Scan with AI"}
          </Button>
        </Card>

        <Card className="p-5">
          <SectionTitle eyebrow="Step 2" title="Extracted data (editable)" />
          {stage === "idle" && <EmptyState icon={ScanLine} title="Nothing scanned yet" sub="Upload a document and run AI extraction to see structured, editable fields here." />}
          {stage === "scanning" && (
            <div className="flex flex-col items-center justify-center gap-2 py-14">
              <Loader2 size={22} className="animate-spin" style={{ color: C.teal }} />
              <span className="text-sm" style={{ color: C.slate }}>Reading document, detecting {docType.toLowerCase()} structure…</span>
            </div>
          )}
          {stage === "done" && extracted && (
            <div className="flex flex-col gap-4">
              <ExtractedFieldsPreview docType={docType} extracted={extracted} />
              {docType !== "Admission Sheet" && (
                <Field label="Attach to patient">
                  <Select value={targetPatientId} onChange={(e) => setTargetPatientId(e.target.value)}>
                    <option value="">Select patient…</option>
                    {state.patients.map((p) => <option key={p.id} value={p.id}>{p.mrn} · {p.name}</option>)}
                  </Select>
                </Field>
              )}
              <details className="text-xs rounded-md border p-2.5" style={{ borderColor: C.line, color: C.slate }}>
                <summary className="cursor-pointer font-medium" style={{ color: C.ink }}>View original OCR text</summary>
                <pre className="whitespace-pre-wrap mt-2 font-mono text-[11px]" style={{ fontFamily: "IBM Plex Mono, monospace" }}>{extracted.originalText}</pre>
              </details>
              <Button variant="teal" icon={CheckCircle2} onClick={saveToRecord}>
                {docType === "Admission Sheet" ? "Continue to Registration" : "Save to Patient Record"}
              </Button>
            </div>
          )}
        </Card>
      </div>
    </div>
  );
}

function ShareLinkModal({ open, onClose, patient, ward, hospitalName }) {
  const [hours, setHours] = useState(72);
  const [link, setLink] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");

  async function generate() {
    setBusy(true); setErr("");
    try {
      const token = uid("shr") + Math.random().toString(36).slice(2, 8);
      const snapshot = {
        name: patient.name, mrn: patient.mrn, age: patient.age, sex: patient.sex, photo: patient.photo,
        wardName: ward?.name || "", bedNumber: patient.bedNumber, diagnosis: patient.diagnosis, icd10: patient.icd10,
        consultant: patient.consultant, status: patient.status, dateOfAdmission: patient.dateOfAdmission,
        bloodGroup: patient.bloodGroup, allergy: patient.allergy, comorbidity: patient.comorbidity,
        investigations: patient.investigations, medications: patient.medications, operations: patient.operations,
        discharge: patient.discharge, hospitalName,
        generatedAt: Date.now(), expiresAt: Date.now() + hours * 3600 * 1000,
      };
      const res = await window.storage.set(`share:${token}`, JSON.stringify(snapshot), true);
      if (!res) throw new Error("Could not create the share link. Try again.");
      const url = `${window.location.origin}${window.location.pathname}?share=${token}`;
      setLink(url);
    } catch (e) {
      setErr(e.message || "Something went wrong generating the link.");
    } finally {
      setBusy(false);
    }
  }

  function copyLink() {
    navigator.clipboard.writeText(link).then(() => alert("Link copied to clipboard."), () => alert("Couldn't copy — select and copy the link manually."));
  }

  return (
    <Modal open={open} onClose={() => { setLink(""); onClose(); }} title="Read-only Share Link">
      <p className="text-xs mb-3" style={{ color: C.slate }}>
        Generates a temporary, view-only link to this chart (demographics, investigations, medications, operative notes, and discharge summary — no edit access) for a consultant to review remotely.
      </p>
      {!link ? (
        <div className="flex flex-wrap items-end gap-2">
          <Field label="Expires after">
            <Select value={hours} onChange={(e) => setHours(Number(e.target.value))}>
              <option value={24}>24 hours</option>
              <option value={72}>72 hours</option>
              <option value={168}>7 days</option>
            </Select>
          </Field>
          <Button variant="teal" icon={busy ? Loader2 : LinkIcon} disabled={busy} onClick={generate}>{busy ? "Generating…" : "Generate Link"}</Button>
        </div>
      ) : (
        <div className="flex flex-col gap-2">
          <div className="text-xs rounded-md p-2.5 break-all font-mono" style={{ background: C.paper, color: C.ink, fontFamily: "IBM Plex Mono, monospace" }}>{link}</div>
          <div className="flex flex-wrap gap-2">
            <Button variant="teal" icon={LinkIcon} onClick={copyLink}>Copy Link</Button>
            <a href={waShareUrl("", `View-only chart for ${patient.name} (${patient.mrn}): ${link}`)} target="_blank" rel="noopener noreferrer"><Button type="button" variant="outline" icon={MessageCircle}>Send via WhatsApp</Button></a>
          </div>
          <div className="text-[11px]" style={{ color: C.slate }}>Expires {new Date(Date.now() + hours * 3600 * 1000).toLocaleString()}. Anyone with this link can view (not edit) this chart until then.</div>
        </div>
      )}
      {err && <div className="text-xs mt-2" style={{ color: C.coral }}>{err}</div>}
    </Modal>
  );
}

/* ---- Patient photo: resized client-side to keep the stored record small ---- */
function resizeImageToDataUrl(file, maxDim = 360, quality = 0.75) {
  return new Promise((resolve, reject) => {
    if (!file.type.startsWith("image/")) { reject(new Error("Please choose an image file.")); return; }
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("Could not read that file."));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error("Could not load that image."));
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) { height = Math.round(height * (maxDim / width)); width = maxDim; }
        else if (height >= width && height > maxDim) { width = Math.round(width * (maxDim / height)); height = maxDim; }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function avatarTone(name) {
  const palette = ["#0E7C86", "#B4790A", "#B5402F", "#2F7A4F", "#5A4FCF", "#C4708F", "#3E7CB1", "#8A6D3B"];
  const code = Array.from(name || "?").reduce((a, c) => a + c.charCodeAt(0), 0);
  return palette[code % palette.length];
}
function initials(name) {
  return (name || "?").trim().split(/\s+/).slice(0, 2).map((w) => w[0]?.toUpperCase() || "").join("") || "?";
}

}

function PhotoUploadField({ name, value, onChange, size = 72 }) {
  const [busy, setBusy] = useState(false);

  );
