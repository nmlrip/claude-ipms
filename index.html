/* ============================== SETTINGS ============================== */
function BackupRestoreCard({ state, update }) {
  const fileRef = useRef(null);
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState(null); // { text, ok }

  function exportBackup() {
    const payload = { ...state, exportedAt: new Date().toISOString(), exportVersion: 1 };
    downloadFile(`mediward-backup-${todayISO()}.json`, JSON.stringify(payload, null, 2), "application/json");
  }

  function pickFile(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    setBusy(true); setMsg(null);
    const reader = new FileReader();
    reader.onerror = () => { setBusy(false); setMsg({ text: "Could not read that file.", ok: false }); };
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (!Array.isArray(data.patients) || !Array.isArray(data.wards)) {
          throw new Error("This doesn't look like a MediWard backup file.");
        }
        const when = data.exportedAt ? new Date(data.exportedAt).toLocaleString() : "an unknown date";
        const confirmed = window.confirm(`This will replace ALL current data in this browser with the backup (${data.patients.length} patients, ${data.wards.length} wards, exported ${when}). This cannot be undone. Continue?`);
        if (!confirmed) { setBusy(false); if (fileRef.current) fileRef.current.value = ""; return; }
        update(() => ({ ...data }));
        setMsg({ text: `Restored ${data.patients.length} patients and ${data.wards.length} wards.`, ok: true });
      } catch (err) {
        setMsg({ text: err.message || "Invalid backup file.", ok: false });
      } finally {
        setBusy(false);
        if (fileRef.current) fileRef.current.value = "";
      }
    };
    reader.readAsText(file);
  }

  return (
    <Card className="p-5 mb-6">
      <SectionTitle eyebrow="Data Safety" title="Backup & Restore" />
      <p className="text-xs mb-3" style={{ color: C.slate }}>
        Everything currently lives in this browser's storage. Export a full backup regularly and keep a copy somewhere safe — this exports the currently active hospital profile ({state.hospitalName}); restoring replaces that profile's data only.
      </p>
      <div className="flex flex-wrap items-center gap-2">
        <Button variant="teal" icon={Download} onClick={exportBackup}>Export Full Backup (.json)</Button>
        <Button variant="outline" icon={busy ? Loader2 : Upload} disabled={busy} onClick={() => fileRef.current?.click()}>{busy ? "Restoring…" : "Import Backup"}</Button>
        <input ref={fileRef} type="file" accept="application/json" className="hidden" onChange={pickFile} />
      </div>
      {msg && <div className="text-xs mt-2" style={{ color: msg.ok ? C.green : C.coral }}>{msg.text}</div>}
      <div className="text-[11px] mt-2" style={{ color: C.slate }}>{state.patients.length} patients · {state.wards.length} wards currently stored in this browser.</div>
    </Card>
  );
}

function SettingsView({ state, update, gsheets }) {
  const { cfg, setCfg, accessToken, connect, disconnect, syncing, syncingAll, syncError, lastSync, syncNow, syncAll } = gsheets;
  const origin = typeof window !== "undefined" ? window.location.origin : "";
  const originUsable = origin && origin !== "null" && !origin.startsWith("null");

  function fullSync() {
    const { header, rows } = patientsSheetRows(state);
    syncNow(cfg.sheetTab || "Patients", header, rows);
  }

  const roadmap = [
    { title: "Auth", now: "Live — Google Identity Services Sign-In, or hospital-email accounts (PBKDF2-hashed passwords) in this workspace's data store", prod: "Firebase Auth + Google OAuth, per-hospital role enforcement, server-verified JWT sessions" },
    { title: "Database", now: "Browser-scoped key-value storage", prod: "Cloud Firestore with real-time listeners across Android + Web" },
    { title: "AI OCR", now: "Simulated extraction per document type", prod: "Gemini API multimodal call on the uploaded image/PDF, structured JSON output" },
    { title: "Google Sheets Sync", now: "Live — Sheets API v4, your own OAuth Client ID + Spreadsheet", prod: "Same flow, plus a server-side service account so sync keeps running when no browser tab is open" },
    { title: "File Storage", now: "Not persisted", prod: "Firebase Storage + Google Drive API, foldered by Ward/Patient ID" },
    { title: "Offline", now: "Requires connection", prod: "Local cache with background sync queue" },
  ];
  return (
    <div>
      <TopBar title="Settings & Sync" sub="Connect Google Sheets for real, plus what's real vs. what a production rollout adds." />

      <BackupRestoreCard state={state} update={update} />

      <SectionTitle eyebrow="Cloud Sync" title="Google Sheets" />
      <Card className="p-5 mb-6">
        {!originUsable && (
          <div className="text-xs rounded-md p-3 mb-4" style={{ background: C.amberSoft, color: C.amber }}>
            This preview's origin isn't a stable URL Google OAuth can authorize ({origin || "none"}). Download this HTML file and open it from a fixed origin — a local static server, GitHub Pages, or any hosting — to complete Google sign-in. Every other feature (including CSV export and "Copy for Sheets") works fine right here.
          </div>
        )}
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
          <Field label="Google OAuth Client ID" hint="Google Cloud Console → APIs & Services → Credentials. This same Client ID also powers Google Sign-In on the login screen.">
            <TextInput value={cfg.clientId} onChange={(e) => setCfg({ clientId: e.target.value })} placeholder="xxxxxxxx.apps.googleusercontent.com" />
          </Field>
          <Field label="Spreadsheet ID" hint="The long ID segment in your Google Sheet's URL">
            <TextInput value={cfg.spreadsheetId} onChange={(e) => setCfg({ spreadsheetId: e.target.value })} placeholder="1AbC-example...xyz" />
          </Field>
          <Field label="Tab name for the full patient roster">
            <TextInput value={cfg.sheetTab || "Patients"} onChange={(e) => setCfg({ sheetTab: e.target.value })} />
          </Field>
          <Field label="Auto-sync">
            <label className="flex items-center gap-2 py-1.5" style={{ color: C.ink }}>
              <input type="checkbox" checked={!!cfg.autoSync} onChange={(e) => setCfg({ autoSync: e.target.checked })} />
              <span className="text-sm">Push every save to Sheets automatically</span>
            </label>
          </Field>
        </div>

        <div className="flex flex-wrap items-center gap-2 mb-1">
          {!accessToken ? (
            <Button variant="teal" icon={FolderSync} onClick={connect}>Connect Google Account</Button>
          ) : (
            <>
              <Pill tone="green">Connected</Pill>
              <Button variant="outline" size="sm" onClick={disconnect}>Disconnect</Button>
            </>
          )}
          <Button variant="teal" icon={syncingAll ? Loader2 : FolderSync} disabled={syncingAll} onClick={syncAll}>
            {syncingAll ? "Syncing all modules…" : "Sync Now — All Data"}
          </Button>
          <Button variant="outline" icon={syncing ? Loader2 : FolderSync} disabled={!accessToken || syncing} onClick={fullSync}>
            {syncing ? "Syncing…" : "Sync Patients Tab Only"}
          </Button>
        </div>
        <div className="text-[11px] mb-3" style={{ color: C.slate }}>
          "Sync Now — All Data" writes five tabs in one go: Patients, Investigations, Medications, Operations, Discharge Summaries. It's also pinned in the sidebar for one-tap access from anywhere.
          {lastSync && <> &nbsp;· Last synced {lastSync.toLocaleTimeString()}</>}
        </div>
        {syncError && <div className="text-xs rounded-md p-2 mb-2" style={{ background: C.coralSoft, color: C.coral }}>{syncError}</div>}

        <details className="text-xs rounded-md border p-3" style={{ borderColor: C.line, color: C.slate }}>
          <summary className="cursor-pointer font-medium" style={{ color: C.ink }}>One-time setup (takes ~3 minutes)</summary>
          <ol style={{ listStyle: "decimal", marginLeft: "1.1rem", marginTop: "0.5rem", display: "flex", flexDirection: "column", gap: "0.25rem" }}>
            <li>At <b>console.cloud.google.com</b>, create a project and enable the <b>Google Sheets API</b>.</li>
            <li>Under Credentials, create an <b>OAuth Client ID</b> (Application type: Web application).</li>
            <li>Add this exact value under Authorized JavaScript origins: <code className="font-mono" style={{ fontFamily: "IBM Plex Mono, monospace", background: C.paper, padding: "1px 4px", borderRadius: "3px" }}>{origin || "(open this file from a real URL first)"}</code></li>
            <li>Paste that Client ID above.</li>
            <li>Open (or create) a Google Sheet, copy the ID from its URL — the segment between <code style={{ fontFamily: "IBM Plex Mono, monospace" }}>/d/</code> and <code style={{ fontFamily: "IBM Plex Mono, monospace" }}>/edit</code> — into the Spreadsheet ID field.</li>
            <li>Click <b>Connect Google Account</b>, approve access, then <b>Sync Now — All Data</b>. The Research tab has its own sync button for filtered cohorts.</li>
          </ol>
        </details>
      </Card>

      <Card className="overflow-hidden mb-6">
        <table className="w-full text-sm">
          <thead><tr className="text-left border-b" style={{ borderColor: C.line, background: C.paper }}>
            {["Layer", "In this prototype", "Production build"].map((h) => <th key={h} className="px-4 py-2 text-[11px] font-semibold uppercase tracking-wide" style={{ color: C.slate }}>{h}</th>)}
          </tr></thead>
          <tbody>
            {roadmap.map((r) => (
              <tr key={r.title} className="border-b last:border-b-0" style={{ borderColor: C.lineSoft }}>
                <td className="px-4 py-2.5 font-semibold" style={{ color: C.ink }}>{r.title}</td>
                <td className="px-4 py-2.5" style={{ color: C.slate }}>{r.now}</td>
                <td className="px-4 py-2.5" style={{ color: C.ink }}>{r.prod}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </Card>
      <SectionTitle eyebrow="Audit" title="Activity Log" />
      <Card className="max-h-72 overflow-y-auto">
        {state.audit.slice(0, 40).map((a) => (
          <div key={a.id} className="flex justify-between px-4 py-2.5 border-b last:border-b-0 text-xs" style={{ borderColor: C.lineSoft }}>
            <span style={{ color: C.ink }}>{a.text}</span>
            <span style={{ color: C.slate }}>{new Date(a.ts).toLocaleString()}</span>
          </div>
        ))}
        {state.audit.length === 0 && <EmptyState icon={ShieldCheck} title="No activity yet" />}
      </Card>
    </div>
  );
}

/* ============================== APP ROOT ============================== */
function App() {
  let shareToken = null;
  try { shareToken = new URLSearchParams(window.location.search).get("share"); } catch {}
  if (shareToken) return <SharedPatientView token={shareToken} />;

  const [container, setContainer] = useState(null);
  const [loading, setLoading] = useState(true);
  const [user, setUser] = useState(null);
  const [route, setRoute] = useState("dashboard");
  const [selectedPatientId, setSelectedPatientId] = useState(null);
  const [jumpTab, setJumpTab] = useState(null);
  const [prefill, setPrefill] = useState(null);
  const [mobileNavOpen, setMobileNavOpen] = useState(false);
  const [paletteOpen, setPaletteOpen] = useState(false);
  const [switcherOpen, setSwitcherOpen] = useState(false);
  const saveTimer = useRef(null);

  useEffect(() => {
    (async () => {
      const [loaded, session] = await Promise.all([loadHospitalsContainer(), loadSession()]);
      setContainer(loaded || seedHospitalsContainer());
      if (session) setUser(session);
      setLoading(false);
    })();
  }, []);

  const activeHospital = container ? (container.hospitals.find((h) => h.id === container.activeHospitalId) || container.hospitals[0]) : null;
  const state = activeHospital ? activeHospital.data : null;

  // `update` keeps the exact same signature every view already uses
  // (update(fn) where fn receives/returns the active hospital's data object) —
  // only the persistence target changed, from one blob to one hospital inside the container.
  const update = useCallback((updater) => {
    setContainer((prevContainer) => {
      if (!prevContainer) return prevContainer;
      const idx = prevContainer.hospitals.findIndex((h) => h.id === prevContainer.activeHospitalId);
      if (idx === -1) return prevContainer;
      const prevData = prevContainer.hospitals[idx].data;
      const nextData = typeof updater === "function" ? updater(prevData) : updater;
      const nextHospitals = prevContainer.hospitals.slice();
      nextHospitals[idx] = { ...nextHospitals[idx], data: nextData };
      const nextContainer = { ...prevContainer, hospitals: nextHospitals };
      if (saveTimer.current) clearTimeout(saveTimer.current);
      saveTimer.current = setTimeout(() => saveHospitalsContainer(nextContainer), 400);
      return nextContainer;
    });
  }, []);

  function switchHospital(id) {
    setContainer((c) => {
      if (!c || c.activeHospitalId === id) return c;
      const next = { ...c, activeHospitalId: id };
      saveHospitalsContainer(next);
      return next;
    });
    setRoute("dashboard"); setSelectedPatientId(null); setJumpTab(null); setSwitcherOpen(false);
  }
  function addHospital(name) {
    const newHosp = { id: uid("hosp"), name, createdAt: Date.now(), data: blankHospitalData(name) };
    setContainer((c) => {
      const next = { ...c, hospitals: [...c.hospitals, newHosp], activeHospitalId: newHosp.id };
      saveHospitalsContainer(next);
      return next;
    });
    setRoute("dashboard"); setSelectedPatientId(null); setJumpTab(null);
    return newHosp.id;
  }
  function renameHospital(id, name) {
    if (!name.trim()) return;
    setContainer((c) => {
      const next = { ...c, hospitals: c.hospitals.map((h) => h.id === id ? { ...h, name: name.trim(), data: { ...h.data, hospitalName: name.trim() } } : h) };
      saveHospitalsContainer(next);
      return next;
    });
  }
  function deleteHospital(id) {
    setContainer((c) => {
      if (!c || c.hospitals.length <= 1) return c;
      const hosp = c.hospitals.find((h) => h.id === id);
      if (!window.confirm(`Delete "${hosp?.name}" and all its patients, wards, and records? This cannot be undone.`)) return c;
      const remaining = c.hospitals.filter((h) => h.id !== id);
      const nextActive = c.activeHospitalId === id ? remaining[0].id : c.activeHospitalId;
      const next = { hospitals: remaining, activeHospitalId: nextActive };
      saveHospitalsContainer(next);
      if (c.activeHospitalId === id) { setRoute("dashboard"); setSelectedPatientId(null); setJumpTab(null); }
      return next;
    });
  }

  // Hooks must run unconditionally (before the loading/login early-returns below),
  // so useGoogleSheetsSync tolerates a null `state` until the initial load resolves.
  const gsheets = useGoogleSheetsSync(state, update);
  const autoSyncTimer = useRef(null);
  useEffect(() => {
    if (!state || !gsheets.cfg.autoSync || !gsheets.accessToken) return;
    if (autoSyncTimer.current) clearTimeout(autoSyncTimer.current);
    autoSyncTimer.current = setTimeout(() => {
      const { header, rows } = patientsSheetRows(state);
      gsheets.syncNow(gsheets.cfg.sheetTab || "Patients", header, rows);
    }, 1800);
    return () => clearTimeout(autoSyncTimer.current);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [state, gsheets.accessToken, gsheets.cfg.autoSync]);

  function openPatient(id, tab) { setSelectedPatientId(id); setJumpTab(tab || null); setRoute("patientDetail"); }
  useEffect(() => {
    function onKey(e) {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") {
        e.preventDefault();
        setPaletteOpen((v) => !v);
      }
    }
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);
  function goRegisterWithPrefill(fields) { setPrefill(fields); setRoute("register"); }

  if (loading || !state) {
    return (
      <div className="min-h-screen flex items-center justify-center" style={{ background: C.paper }}>
        <style>{FONT_IMPORT}</style>
        <Loader2 className="animate-spin" size={22} style={{ color: C.teal }} />
      </div>
    );
  }

  function logout() {
    clearSession();
    setUser(null);
  }

  if (!user) return <><style>{FONT_IMPORT}</style><AuthView onLogin={setUser} hospitalName={state.hospitalName} state={state} update={update} /></>;

  const admitted = state.patients.filter((p) => p.status === "admitted");
  const totalBeds = state.wards.reduce((n, w) => n + (w.beds || 0), 0);
  const occupancy = totalBeds ? Math.round((admitted.length / totalBeds) * 100) : 0;
  const selectedPatient = state.patients.find((p) => p.id === selectedPatientId);
  const selectedWard = state.wards.find((w) => w.id === selectedPatient?.wardId);

  return (
    <div style={{ background: C.paper, minHeight: "100vh", fontFamily: "IBM Plex Sans, sans-serif" }}>
      <style>{`
        ${FONT_IMPORT}
        * { box-sizing: border-box; }
        input:focus, select:focus, textarea:focus { border-color: ${C.teal} !important; box-shadow: 0 0 0 3px ${C.tealSoft}; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: ${C.line}; border-radius: 4px; }
        @media print {
          body * { visibility: hidden; }
          .print-area, .print-area * { visibility: visible; }
          .print-area { position: absolute; left: 0; top: 0; width: 100%; }
        }
      `}</style>
      <div className="mw-topbar-mobile items-center justify-between px-4 py-3 border-b" style={{ background: C.ink, borderColor: "#1C3A5A" }}>
        <button onClick={() => setMobileNavOpen(true)} className="p-1.5 -ml-1.5 rounded hover:bg-white/10">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div className="flex items-center gap-2">
          <div className="h-6 w-6 rounded flex items-center justify-center font-bold text-[10px]" style={{ background: C.teal, color: "#fff" }}>MW</div>
          <span className="font-serif text-sm" style={{ color: "#fff", fontFamily: "Fraunces, serif" }}>MediWard AI</span>
        </div>
        <div className="flex items-center gap-1 -mr-1.5">
          <button onClick={() => setPaletteOpen(true)} className="p-1.5 rounded hover:bg-white/10">
            <Search size={17} style={{ color: "#fff" }} />
          </button>
          <button onClick={() => gsheets.syncAll()} disabled={gsheets.syncingAll} className="p-1.5 rounded hover:bg-white/10">
            {gsheets.syncingAll ? <Loader2 size={18} className="animate-spin" style={{ color: "#fff" }} /> : <FolderSync size={18} style={{ color: gsheets.accessToken ? "#4FD1C5" : "#fff" }} />}
          </button>
        </div>
      </div>
      <CommandPalette open={paletteOpen} onClose={() => setPaletteOpen(false)} patients={state.patients} wards={state.wards} onSelect={(id) => { openPatient(id); setPaletteOpen(false); }} />
      <HospitalSwitcherModal open={switcherOpen} onClose={() => setSwitcherOpen(false)} hospitals={container.hospitals} activeId={container.activeHospitalId}
        onSwitch={switchHospital} onAdd={addHospital} onRename={renameHospital} onDelete={deleteHospital} />
      <div className="flex">
        <Sidebar route={route} setRoute={(r) => { setRoute(r); setPrefill(null); }} user={user} onLogout={logout} occupancy={occupancy}
          mobileOpen={mobileNavOpen} onCloseMobile={() => setMobileNavOpen(false)} gsheets={gsheets} onOpenPalette={() => setPaletteOpen(true)}
          hospitalName={state.hospitalName} onOpenSwitcher={() => setSwitcherOpen(true)} />
        <div className="flex-1 min-w-0 p-6 md:p-8">
          {route === "dashboard" && <DashboardView state={state} setRoute={setRoute} openPatient={openPatient} />}
          {route === "wards" && <WardsView state={state} update={update} />}
          {route === "patients" && <PatientsListView state={state} openPatient={openPatient} />}
          {route === "register" && <RegisterView state={state} update={update} prefill={prefill} onDone={() => { setPrefill(null); setRoute("patients"); }} />}
          {route === "ocr" && <OcrView state={state} update={update} goRegisterWithPrefill={goRegisterWithPrefill} />}
          {route === "operationList" && <OperationListView state={state} update={update} openPatient={openPatient} />}
          {route === "tasks" && <TasksHubView state={state} update={update} openPatient={openPatient} />}
          {route === "referrals" && <ReferralRegisterView state={state} openPatient={openPatient} />}
          {route === "followups" && <FollowUpTrackerView state={state} openPatient={openPatient} />}
          {route === "statistics" && <StatisticsView state={state} />}
          {route === "research" && <ResearchView state={state} gsheets={gsheets} />}
          {route === "search" && <SearchView state={state} openPatient={openPatient} />}
          {route === "settings" && <SettingsView state={state} update={update} gsheets={gsheets} />}
          {route === "patientDetail" && <PatientDetailView patient={selectedPatient} ward={selectedWard} wards={state.wards} update={update} onBack={() => setRoute("patients")} initialTab={jumpTab} hospitalName={state.hospitalName} />}
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
